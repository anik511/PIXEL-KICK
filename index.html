<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIXEL KICK — Retro Arcade Soccer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
  }

  #wrapper {
    position: relative;
    width: 640px;
    height: 480px;
  }

  #gameCanvas {
    display: block;
    image-rendering: pixelated;
    cursor: none;
  }

  /* CRT overlay */
  #crt {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
    background:
      repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.08) 0px,
        rgba(0,0,0,0.08) 1px,
        transparent 1px,
        transparent 3px
      );
    border-radius: 4px;
  }

  #crt::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.55) 100%);
    border-radius: 4px;
  }

  #scanline {
    position: absolute;
    top: -100%;
    left: 0;
    width: 100%;
    height: 20%;
    background: linear-gradient(to bottom,
      transparent 0%,
      rgba(255,255,255,0.03) 50%,
      transparent 100%
    );
    animation: scan 8s linear infinite;
    pointer-events: none;
    z-index: 11;
  }

  @keyframes scan {
    0%   { top: -20%; }
    100% { top: 110%; }
  }

  #title-screen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #000810;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    gap: 20px;
  }

  .title-glow {
    font-family: 'Press Start 2P', monospace;
    font-size: 32px;
    color: #fff;
    text-shadow:
      0 0 10px #0ff,
      0 0 30px #0ff,
      0 0 60px #0af,
      4px 4px 0 #006;
    animation: titlePulse 1.5s ease-in-out infinite alternate;
    letter-spacing: 4px;
  }

  .title-sub {
    font-family: 'VT323', monospace;
    font-size: 22px;
    color: #ff0;
    text-shadow: 2px 2px 0 #880, 0 0 15px #ff0;
    animation: blink 0.8s step-end infinite;
  }

  .title-info {
    font-family: 'VT323', monospace;
    font-size: 16px;
    color: #0f8;
    text-align: center;
    line-height: 28px;
    text-shadow: 0 0 8px #0f8;
  }

  @keyframes titlePulse {
    from { text-shadow: 0 0 10px #0ff, 0 0 30px #0ff, 4px 4px 0 #006; }
    to   { text-shadow: 0 0 20px #0ff, 0 0 50px #0af, 0 0 80px #08f, 4px 4px 0 #006; }
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  #hud {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 9;
  }

  .score-display {
    position: absolute;
    top: 10px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: #fff;
    text-shadow: 0 0 8px #0ff, 2px 2px 0 #004;
    white-space: nowrap;
  }

  .shots-display {
    position: absolute;
    top: 30px; left: 50%;
    transform: translateX(-50%);
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: #ff0;
    text-shadow: 0 0 6px #ff0;
    white-space: nowrap;
  }

  #outcome-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Press Start 2P', monospace;
    font-size: 28px;
    color: #fff;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    z-index: 15;
    transition: opacity 0.1s;
    white-space: nowrap;
  }

  #combo-text {
    position: absolute;
    top: 38%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'VT323', monospace;
    font-size: 22px;
    color: #ff0;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    z-index: 15;
    text-shadow: 0 0 10px #ff0;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div id="wrapper">
  <canvas id="gameCanvas" width="640" height="480"></canvas>
  <div id="crt"></div>
  <div id="scanline"></div>
  <div id="hud">
    <div class="score-display" id="scoreDisplay">GOALS: 0 | SHOTS: 0</div>
    <div class="shots-display" id="shotsDisplay">ARROWS/MOUSE → AIM  |  HOLD SPACE → CHARGE  |  RELEASE → SHOOT</div>
  </div>
  <div id="outcome-text"></div>
  <div id="combo-text"></div>

  <div id="title-screen">
    <div class="title-glow">PIXEL KICK</div>
    <div style="font-family:'VT323',monospace;font-size:18px;color:#888;text-shadow:1px 1px 0 #333;">RETRO ARCADE SOCCER ©1987</div>
    <div class="title-sub" style="margin-top:10px;">— INSERT COIN —</div>
    <div class="title-info">
      MOUSE / ARROWS → AIM<br>
      HOLD SPACE → CHARGE POWER<br>
      RELEASE SPACE → SHOOT<br>
      CLICK → SKIP / RESTART
    </div>
    <div style="margin-top:8px;font-family:'VT323',monospace;font-size:14px;color:#555;">HI-SCORE: 9999</div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 640, H = 480;

// ─── STATE ───────────────────────────────────────────────
let state = 'title';
let score = 0, totalShots = 0, combo = 0, maxCombo = 0;
let aimX = W/2, aimY = H/2;
let camBob = 0, camBobTime = 0;
let shake = {x:0, y:0, power:0};
let particles = [];
let crowdParticles = [];
let stars = [];
let flickerFrames = 0;
let resultTimer = 0;
let currentOutcome = '';
let lastShotZone = null;
let ballAnim = null;
let kickAnim = null;
let gkAnim = null;
let ballShadow = {x:W/2, y:H*0.72, r:12};
let celebrationTimer = 0;
let crowdCheerLevel = 0;
let crowdBaseNoise = [];
let frame = 0;
let curveDir = 0;
let chargeLevel = 0;
let isCharging = false;
const MAX_SHOTS = 5;
let shotsLeft = MAX_SHOTS;

// ── Feature: Ball Trail ───────────────────────────────────
let ballTrail = [];            // [{x,y,r,alpha}]
const TRAIL_LEN = 10;

// ── Feature: Freeze Frame ─────────────────────────────────
let freezeFrames = 0;

// ── Feature: Divot / Scorch Mark ─────────────────────────
let divotMark = null;

// ── Feature: Net Bulge ────────────────────────────────────
let netBulgeTimer = 0;

// ── Feature: Commentator ─────────────────────────────────
let commentatorLine = '';
let commentatorTimer = 0;

// ── Feature: Sound (Web Audio API) ───────────────────────
let audioCtx = null;

// ── Feature: Wind ─────────────────────────────────────────
let windStrength = 0;
let windAngle    = 0;

// ── Feature: Crowd Reaction Mode ──────────────────────────
let crowdMode    = 'idle';
let crowdModeTimer = 0;

// ─── INIT ─────────────────────────────────────────────────
for(let i=0;i<80;i++) stars.push({x:Math.random()*W,y:Math.random()*(H*0.35),b:Math.random()});
for(let i=0;i<60;i++) crowdBaseNoise.push({x:Math.random()*W,y:H*0.18+Math.random()*H*0.14,c:randCrowdColor(),phase:Math.random()*Math.PI*2});

// GK starts idle immediately — visible from the very first frame
gkAnim = { phase:'idle', dir:0, frameCount:0, outcome:'' };

// ─── AUDIO ENGINE ─────────────────────────────────────────
function initAudio(){
  if(audioCtx) return audioCtx;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playSound(type){
  try {
    const ac = initAudio();
    if(ac.state === 'suspended') ac.resume();
    const now = ac.currentTime;

    if(type === 'kick'){
      // Deep boot thud: low sine burst + noise punch
      const osc  = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(90, now);
      osc.frequency.exponentialRampToValueAtTime(30, now + 0.12);
      gain.gain.setValueAtTime(0.9, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
      osc.start(now); osc.stop(now + 0.18);
      // White noise click layer
      const buf  = ac.createBuffer(1, ac.sampleRate * 0.06, ac.sampleRate);
      const data = buf.getChannelData(0);
      for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*0.4;
      const src2  = ac.createBufferSource();
      const filt  = ac.createBiquadFilter();
      const ng    = ac.createGain();
      src2.buffer = buf;
      filt.type = 'lowpass'; filt.frequency.value = 800;
      src2.connect(filt); filt.connect(ng); ng.connect(ac.destination);
      ng.gain.setValueAtTime(0.7, now);
      ng.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
      src2.start(now);
    }

    else if(type === 'whoosh'){
      // Ball flight whoosh — filtered noise sweep
      const buf  = ac.createBuffer(1, ac.sampleRate * 0.5, ac.sampleRate);
      const data = buf.getChannelData(0);
      for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1);
      const src  = ac.createBufferSource();
      const filt = ac.createBiquadFilter();
      const gain = ac.createGain();
      src.buffer = buf;
      filt.type  = 'bandpass';
      filt.frequency.setValueAtTime(3000, now);
      filt.frequency.exponentialRampToValueAtTime(800, now + 0.45);
      filt.Q.value = 4;
      gain.gain.setValueAtTime(0.0, now);
      gain.gain.linearRampToValueAtTime(0.3, now + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
      src.connect(filt); filt.connect(gain); gain.connect(ac.destination);
      src.start(now);
    }

    else if(type === 'goal'){
      // Crowd roar — layered noise swell
      for(let layer=0;layer<3;layer++){
        const buf  = ac.createBuffer(1, ac.sampleRate * 1.8, ac.sampleRate);
        const data = buf.getChannelData(0);
        for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1);
        const src  = ac.createBufferSource();
        const filt = ac.createBiquadFilter();
        const gain = ac.createGain();
        src.buffer = buf;
        filt.type  = 'lowpass';
        filt.frequency.value = 300 + layer*200;
        gain.gain.setValueAtTime(0.0, now);
        gain.gain.linearRampToValueAtTime(0.18-layer*0.04, now+0.15);
        gain.gain.linearRampToValueAtTime(0.12-layer*0.02, now+1.2);
        gain.gain.exponentialRampToValueAtTime(0.001, now+1.8);
        src.connect(filt); filt.connect(gain); gain.connect(ac.destination);
        src.start(now + layer*0.04);
      }
      // Net swish — short high noise burst
      const nbuf  = ac.createBuffer(1, ac.sampleRate * 0.12, ac.sampleRate);
      const ndata = nbuf.getChannelData(0);
      for(let i=0;i<ndata.length;i++) ndata[i]=(Math.random()*2-1);
      const nsrc  = ac.createBufferSource();
      const nfilt = ac.createBiquadFilter();
      const ngain = ac.createGain();
      nsrc.buffer = nbuf;
      nfilt.type  = 'highpass'; nfilt.frequency.value = 4000;
      ngain.gain.setValueAtTime(0.4, now+0.12);
      ngain.gain.exponentialRampToValueAtTime(0.001, now+0.24);
      nsrc.connect(nfilt); nfilt.connect(ngain); ngain.connect(ac.destination);
      nsrc.start(now + 0.12);
    }

    else if(type === 'save'){
      // Glove slap — sharp mid transient
      const osc  = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(220, now);
      osc.frequency.exponentialRampToValueAtTime(80, now + 0.08);
      gain.gain.setValueAtTime(0.5, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      osc.start(now); osc.stop(now + 0.1);
      // Crowd groan — low filtered noise
      const buf  = ac.createBuffer(1, ac.sampleRate * 0.9, ac.sampleRate);
      const data = buf.getChannelData(0);
      for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1);
      const src  = ac.createBufferSource();
      const filt = ac.createBiquadFilter();
      const ng   = ac.createGain();
      src.buffer = buf;
      filt.type  = 'lowpass'; filt.frequency.value = 180;
      ng.gain.setValueAtTime(0.0, now+0.05);
      ng.gain.linearRampToValueAtTime(0.10, now+0.2);
      ng.gain.exponentialRampToValueAtTime(0.001, now+0.9);
      src.connect(filt); filt.connect(ng); ng.connect(ac.destination);
      src.start(now+0.05);
    }

    else if(type === 'post'){
      // Metallic clang — detuned pair of oscillators with decay
      [200, 202, 308, 312].forEach((freq, i) => {
        const osc  = ac.createOscillator();
        const gain = ac.createGain();
        osc.connect(gain); gain.connect(ac.destination);
        osc.type = 'sawtooth';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.22, now + i*0.005);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
        osc.start(now + i*0.005); osc.stop(now + 0.65);
      });
    }

    else if(type === 'miss'){
      // Deflated tuba-ish wah-wah
      [130, 123, 116].forEach((freq, i) => {
        const osc  = ac.createOscillator();
        const gain = ac.createGain();
        osc.connect(gain); gain.connect(ac.destination);
        osc.type = 'triangle';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.18, now + i*0.14);
        gain.gain.exponentialRampToValueAtTime(0.001, now + i*0.14 + 0.13);
        osc.start(now + i*0.14); osc.stop(now + i*0.14 + 0.14);
      });
    }

    else if(type === 'whistle'){
      // Referee short pip
      const osc  = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(2400, now);
      osc.frequency.setValueAtTime(2600, now+0.04);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
      osc.start(now); osc.stop(now + 0.12);
    }

    else if(type === 'slowmo'){
      // Deep cinematic whomp on slow-mo trigger
      const osc  = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(60, now);
      osc.frequency.exponentialRampToValueAtTime(25, now + 0.4);
      gain.gain.setValueAtTime(0.5, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      osc.start(now); osc.stop(now + 0.4);
    }

  } catch(e){ /* audio blocked — ignore silently */ }
}

function randCrowdColor(){
  const cols=['#ff3333','#3366ff','#ffff00','#ffffff','#33cc33','#ff9900','#cc33ff','#00ffff'];
  return cols[Math.floor(Math.random()*cols.length)];
}

// ─── INPUT ────────────────────────────────────────────────
let keys = {};
// Prevent arrow keys and space from scrolling the page
document.addEventListener('keydown', e=>{
  if(['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
  keys[e.code]=true;

  if(e.code==='Space'){
    if(state==='title')   { startGame(); return; }
    if(state==='aiming')  { if(!isCharging){ isCharging=true; chargeLevel=0; } return; }
    if(state==='result')  { nextShot(); return; }
    if(state==='gameover'){ initGame(); return; }
  }
  if(e.code==='Enter'){
    if(state==='title')   { startGame(); return; }
    if(state==='result')  { nextShot(); return; }
    if(state==='gameover'){ initGame(); return; }
  }
});

document.addEventListener('keyup', e=>{
  keys[e.code]=false;
  // Space release fires the shot
  if(e.code==='Space' && state==='aiming' && isCharging){
    shoot();
    isCharging=false;
  }
});

// Mouse: move updates aim, click only restarts (no shoot-on-click to avoid conflicts)
canvas.addEventListener('mousemove', e=>{
  const r=canvas.getBoundingClientRect();
  aimX=e.clientX-r.left;
  aimY=e.clientY-r.top;
});

// Click is ONLY for title/result/gameover transitions, never for shooting
canvas.addEventListener('click', e=>{
  if(state==='title')   { startGame(); return; }
  if(state==='result')  { nextShot(); return; }
  if(state==='gameover'){ initGame(); return; }
});

// ─── GAME LOGIC ───────────────────────────────────────────
function startGame(){ document.getElementById('title-screen').style.display='none'; initGame(); }

function initGame(){
  score=0; totalShots=0; combo=0; maxCombo=0; shotsLeft=MAX_SHOTS;
  particles=[];
  ballTrail=[];
  divotMark=null;
  netBulgeTimer=0;
  commentatorLine=''; commentatorTimer=0;
  freezeFrames=0;
  windStrength=0; windAngle=0;
  crowdMode='idle'; crowdModeTimer=0;
  updateHUD();
  state='aiming';
  chargeLevel=0;
  isCharging=false;
  crowdCheerLevel=0;
  gkAnim = { phase:'idle', dir:0, frameCount:0, outcome:'' };
}

function nextShot(){
  ballAnim=null; kickAnim=null;
  ballTrail=[];
  freezeFrames=0;
  divotMark=null;
  netBulgeTimer=0;
  commentatorLine=''; commentatorTimer=0;
  gkAnim = { phase:'idle', dir:0, frameCount:0, outcome:'' };
  chargeLevel=0;
  isCharging=false;
  showOutcome('', '', '');

  if(shotsLeft<=0){
    state='gameover';
    updateHUD();
    return;
  }
  state='aiming';
  updateHUD();
}

// ─── POWER ZONES ──────────────────────────────────────────
// 0.00–0.30 → POOR   (goal 20%)
// 0.30–0.55 → GOOD   (goal 50%)
// 0.55–0.75 → PERFECT(goal 90%)
// 0.75–1.00 → BAD    (goal  0%)
const POWER_ZONES = [
  { label:'POOR',    from:0.00, to:0.30, col:'#ff8800', goalChance:0.20 },
  { label:'GOOD',    from:0.30, to:0.55, col:'#ffff00', goalChance:0.50 },
  { label:'PERFECT', from:0.55, to:0.75, col:'#00ff88', goalChance:0.90 },
  { label:'BAD',     from:0.75, to:1.00, col:'#ff2222', goalChance:0.00 },
];

function getZone(lvl){
  return POWER_ZONES.find(z => lvl >= z.from && lvl < z.to) || POWER_ZONES[3];
}

function shoot(){
  if(state!=='aiming') return;
  state='kicking';
  totalShots++;
  shotsLeft--;

  const zone  = getZone(chargeLevel);
  const power = 0.5 + chargeLevel * 0.5;
  curveDir = 0;

  // ── Goal frame in screen-space ──────────────────────────
  // Posts: lp=W*0.305, rp=W*0.695+8  top=H*0.27  bot=H*0.50
  const GOAL_LX  = W * 0.305;          // inner left post edge
  const GOAL_RX  = W * 0.695 + 8;      // inner right post edge
  const GOAL_TOP = H * 0.27;
  const GOAL_BOT = H * 0.50;

  // ── Is the crosshair inside the goal frame? ─────────────
  const aimedInGoal = (
    aimX >= GOAL_LX && aimX <= GOAL_RX &&
    aimY >= GOAL_TOP && aimY <= GOAL_BOT
  );

  let outcome, targetX, targetY;

  if(!aimedInGoal){
    // ── AIMED OUTSIDE THE POST — always miss ──────────────
    outcome = 'miss';
    // Ball travels toward where the player actually aimed
    targetX = aimX;
    targetY = aimY;
  } else if(zone.label === 'BAD'){
    // ── BAD power zone — always miss even inside frame ────
    outcome = 'miss';
    // Skew the ball just outside the frame for visual drama
    const missDir = (aimX < W/2) ? -1 : 1;
    const missRoll = Math.random();
    if(missRoll < 0.5){
      targetX = (missDir < 0) ? W * 0.25 : W * 0.75;
      targetY = aimY + (Math.random() - 0.5) * 40;
    } else {
      targetX = aimX + missDir * 30;
      targetY = H * 0.06;             // skied over bar
    }
  } else {
    // ── Aimed inside goal — use zone goal-chance roll ─────
    const roll   = Math.random();
    const isGoal = roll < zone.goalChance;

    if(isGoal){
      const isCurve = Math.random() < 0.18;
      outcome  = isCurve ? 'curve' : 'goal';
      curveDir = isCurve ? (Math.random() < 0.5 ? 1 : -1) : 0;
      // Ball lands exactly where player aimed (inside goal)
      targetX  = aimX;
      targetY  = aimY;
    } else {
      // Fail inside frame — save, post, or scrambled miss
      const failRoll = Math.random();
      if(failRoll < 0.55){
        outcome = 'save';
        // GK positioned toward aimed side
        targetX = aimX;
        targetY = aimY;
      } else if(failRoll < 0.80){
        outcome = 'post';
        // Snap to nearest post
        const distL = Math.abs(aimX - GOAL_LX);
        const distR = Math.abs(aimX - GOAL_RX);
        targetX = (distL < distR) ? GOAL_LX : GOAL_RX;
        targetY = aimY;
      } else {
        // Narrowly wide or just over
        outcome = 'miss';
        const missDir2 = (aimX < W/2) ? -1 : 1;
        targetX = aimX + missDir2 * (20 + Math.random() * 30);
        targetY = aimY - 10;
      }
    }
  }

  // ── GK reaction — always visible, phase depends on outcome ─
  if(outcome === 'save'){
    const diveDir = (targetX < W/2) ? -1 : 1;
    // Randomise catch vs deflect for variety
    const saveType = Math.random() < 0.55 ? 'catch' : 'deflect';
    gkAnim = { phase:'ready', dir:diveDir, frameCount:0, outcome:saveType, targetX, targetY };
  } else if(outcome === 'goal' || outcome === 'curve'){
    // Dives the wrong way — full commit wrong side
    const wrongDir = (targetX < W/2) ? 1 : -1;
    gkAnim = { phase:'ready', dir:wrongDir, frameCount:0, outcome:'wrongdive', targetX, targetY };
  } else if(outcome === 'post'){
    // Slight reach toward post then recoil
    const postDir = (targetX < W/2) ? -1 : 1;
    gkAnim = { phase:'ready', dir:postDir, frameCount:0, outcome:'post', targetX, targetY };
  } else {
    // Miss — GK watches ball go wide, slight lean — start idle, update loop triggers watch
    const watchDir = (targetX < W/2) ? -1 : 1;
    gkAnim = { phase:'idle', dir:watchDir, frameCount:0, outcome:'watch', targetX, targetY };
  }

  currentOutcome = outcome;
  lastShotZone   = zone;
  kickAnim = { t:0, phase:'windup' };

  // ── Ball speed driven purely by chargeLevel ───────────────
  // POOR(0–30%) = slow floaty dur 70  BAD(75–100%) = wild dur 62
  // GOOD(30–55%) = medium dur 48      PERFECT(55–75%) = fast dur 28
  const baseDur = zone.label === 'PERFECT' ? 28
                : zone.label === 'GOOD'    ? 48
                : zone.label === 'POOR'    ? 70
                :                           62; // BAD — skied/wild
  // Miss shots always travel full distance to edge — add a few frames
  const dur = outcome === 'miss' ? baseDur + 14 : baseDur;

  ballAnim = {
    sx:W/2, sy:H*0.68, tx:targetX, ty:targetY,
    t:0, dur,
    power, outcome, curveDir, spin:0
  };
  resultTimer = 0;

  // ── Divot mark ────────────────────────────────────────────
  divotMark = { x: W/2 + (Math.random()-0.5)*8, y: H*0.72 };

  // ── Wind: new random value each shot ─────────────────────
  windStrength = (Math.random()*2 - 1) * 0.8;

  // ── Sound: kick thud + whoosh ─────────────────────────────
  playSound('kick');
  setTimeout(() => playSound('whoosh'), 80);
  playSound('whistle');

  // ── Commentator pre-shot line (zone-aware) ───────────────
  const preLines = {
    POOR:    ['A weak effort...','Not much behind that one.','Lacking conviction!'],
    GOOD:    ['He steps up...','A measured approach.','Decent strike incoming!'],
    PERFECT: ['WHAT A HIT!','Absolutely thundered!','Pure technique!'],
    BAD:     ["Oh no, he's slipped!",'Terrible contact!',"That's gone badly wrong!"]
  };
  const zonePre = preLines[zone.label] || ['He shoots...'];
  setCommentator(zonePre[Math.floor(Math.random()*zonePre.length)], 90);
}

// ─── COMMENTATOR ──────────────────────────────────────────
function setCommentator(line, duration=110){
  commentatorLine  = line;
  commentatorTimer = duration;
}

function resolveOutcome(o){
  // Rich outcome lines — also sets a detailed commentator follow-up
  const data = {
    goal: {
      big:  ['GOAAAAAL!!', "IT'S IN THE NET!!", 'WHAT A FINISH!!', 'SCREAMER!!'],
      comm: ['Keeper had no chance!', 'Right in the bottom corner!', 'The crowd goes absolutely wild!', 'Unstoppable strike!']
    },
    curve: {
      big:  ['CURVED IN!!', 'BANANA SHOT!!', 'ROBERTO CARLOS!!', 'WHAT A STRIKE!!'],
      comm: ['Incredible bend on that!', 'Defied all physics!', "The keeper was watching it all the way - helpless!", 'Pure magic from the spot!']
    },
    save: {
      big:  ['SAVED!!', 'KEEPER STOPS IT!', 'GREAT SAVE!!', 'DENIED!!'],
      comm: ['Brilliant dive to his right!', 'He read it perfectly!', 'What a stop — gloves like magnets!', 'The keeper wins this battle!']
    },
    post: {
      big:  ['POST!!', 'OFF THE WOODWORK!', 'SO CLOSE!!', 'RATTLES THE FRAME!'],
      comm: ['Inches away from glory...', "The post is his saviour!", 'That must have stung — centimetres wide!', 'Out of luck today!']
    },
    miss: {
      big:  ['MISSED!!', 'OVER THE BAR!', 'WIDE!!', 'SKIED IT!!'],
      comm: ['Row Z! No doubt about it.', 'Nowhere near the target.', 'The pressure got to him!', 'That\'s going to hurt...']
    }
  };
  const d    = data[o] || data.miss;
  const idx  = Math.floor(Math.random() * d.big.length);
  // Fire the follow-up commentator line slightly delayed
  setTimeout(()=> setCommentator(d.comm[idx % d.comm.length], 140), 400);
  return d.big[idx];
}

function processResult(o){

  if(o==='goal'||o==='curve'){
    score++;
    combo++;
    if(combo>maxCombo) maxCombo=combo;
    crowdCheerLevel=1;
    spawnGoalParticles();
    triggerShake(8,18);
    netBulgeTimer = 1;
    crowdMode = 'goal';  crowdModeTimer = 180;
    playSound('goal');
  } else if(o==='post'){
    triggerShake(5,10);
    freezeFrames = 5;
    combo=0;
    crowdMode = 'post';  crowdModeTimer = 90;
    playSound('post');
  } else if(o==='save'){
    triggerShake(3,8);
    freezeFrames = 4;
    combo=0;
    crowdMode = 'save';  crowdModeTimer = 120;
    playSound('save');
  } else {
    combo=0;
    crowdMode = 'miss';  crowdModeTimer = 100;
    playSound('miss');
  }

  state='result';
  resultTimer=0;
  updateHUD();

  const zoneLabel = lastShotZone ? lastShotZone.label : '';
  const msg = resolveOutcome(o);
  showOutcome(msg, o, zoneLabel);

  const delay = shotsLeft<=0 ? 2500 : 2000;
  setTimeout(()=>{ if(state==='result') nextShot(); }, delay);
}

function updateHUD(){
  document.getElementById('scoreDisplay').textContent=`GOALS: ${score} | SHOTS: ${totalShots}`;
  if(state==='aiming'){
    document.getElementById('shotsDisplay').textContent=`⚽ x${shotsLeft}  |  AIM: MOUSE/ARROWS  SHOOT: HOLD+RELEASE SPACE`;
  } else if(state==='kicking'){
    document.getElementById('shotsDisplay').textContent='';
  } else {
    document.getElementById('shotsDisplay').textContent='';
  }
}

// ─── PARTICLES ────────────────────────────────────────────
function spawnGoalParticles(){
  const colors=['#ff0','#f0f','#0ff','#0f0','#f80','#fff','#f44'];
  for(let i=0;i<80;i++){
    const ang=Math.random()*Math.PI*2;
    const spd=2+Math.random()*6;
    particles.push({
      x:W/2+Math.random()*200-100, y:H*0.45,
      vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd-4,
      life:1, decay:0.012+Math.random()*0.015,
      r:3+Math.random()*5,
      color:colors[Math.floor(Math.random()*colors.length)],
      shape:Math.random()<0.4?'star':'circle'
    });
  }
  // Crowd reaction particles
  for(let i=0;i<30;i++){
    crowdParticles.push({
      x:Math.random()*W, y:H*0.18+Math.random()*H*0.15,
      vy:-(1+Math.random()*3),
      life:1, decay:0.02,
      color:randCrowdColor(), r:4+Math.random()*4
    });
  }
}

function spawnPostParticles(px,py){
  for(let i=0;i<20;i++){
    const ang=Math.random()*Math.PI*2;
    particles.push({
      x:px,y:py,
      vx:Math.cos(ang)*3, vy:Math.sin(ang)*3,
      life:1,decay:0.03,r:3+Math.random()*3,
      color:'#fff',shape:'circle'
    });
  }
}

function spawnSaveParticles(px,py){
  for(let i=0;i<25;i++){
    const ang=Math.random()*Math.PI*2;
    particles.push({
      x:px,y:py,
      vx:Math.cos(ang)*2, vy:Math.sin(ang)*2-2,
      life:1,decay:0.025,r:2+Math.random()*4,
      color:Math.random()<0.5?'#ff4':'#0cf',shape:'circle'
    });
  }
}

function triggerShake(power,frames){
  shake.power=power; shake.frames=frames;
}

function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy;
    p.vy+=0.15; p.vx*=0.98;
    p.life-=p.decay;
    if(p.life<=0) particles.splice(i,1);
  }
  for(let i=crowdParticles.length-1;i>=0;i--){
    const p=crowdParticles[i];
    p.y+=p.vy; p.vy+=0.08;
    p.life-=p.decay;
    if(p.life<=0) crowdParticles.splice(i,1);
  }
  if(crowdCheerLevel>0) crowdCheerLevel-=0.005;
  if(crowdCheerLevel<0) crowdCheerLevel=0;
}

// ─── DRAWING HELPERS ──────────────────────────────────────
function px(x){ return Math.round(x); }
function py(y){ return Math.round(y); }

function drawPixelRect(x,y,w,h,col){
  ctx.fillStyle=col;
  ctx.fillRect(px(x),py(y),w,h);
}

function drawStar(x,y,r,col,alpha=1){
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.fillStyle=col;
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const a=(i*Math.PI*2/5)-Math.PI/2;
    const a2=a+Math.PI/5;
    if(i===0) ctx.moveTo(x+Math.cos(a)*r, y+Math.sin(a)*r);
    else ctx.lineTo(x+Math.cos(a)*r, y+Math.sin(a)*r);
    ctx.lineTo(x+Math.cos(a2)*(r*0.4), y+Math.sin(a2)*(r*0.4));
  }
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

// ─── SCENE RENDERING ──────────────────────────────────────

function drawSky(){
  // Night sky gradient
  const grad=ctx.createLinearGradient(0,0,0,H*0.38);
  grad.addColorStop(0,'#000510');
  grad.addColorStop(1,'#001a3a');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H*0.38);

  // Stars
  stars.forEach(s=>{
    const b=0.3+s.b*0.7*(0.8+0.2*Math.sin(frame*0.02+s.b*10));
    ctx.fillStyle=`rgba(255,255,255,${b})`;
    ctx.fillRect(px(s.x),py(s.y),1,1);
  });

  // Moon
  ctx.fillStyle='#fffce0';
  ctx.beginPath();
  ctx.arc(W*0.85,H*0.07,14,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#000d1a';
  ctx.beginPath();
  ctx.arc(W*0.85+8,H*0.07-4,11,0,Math.PI*2);
  ctx.fill();
}

function drawCrowd(){
  const standsGrad=ctx.createLinearGradient(0,H*0.18,0,H*0.38);
  standsGrad.addColorStop(0,'#111122');
  standsGrad.addColorStop(1,'#0a0a14');
  ctx.fillStyle=standsGrad;
  ctx.fillRect(0,py(H*0.18),W,py(H*0.20));

  const rowCount=4;
  for(let row=0;row<rowCount;row++){
    const ry=H*0.20+row*(H*0.045);
    for(let col=0;col<32;col++){
      const cx2   = col*(W/32)+W/64;
      const noise = crowdBaseNoise[(row*8+col)%crowdBaseNoise.length];
      const phase = noise.phase;
      const modeT = Math.max(0, crowdModeTimer/180);

      let bob = 0;
      let headCol = `hsl(${(col*37+row*77)%360},60%,55%)`;
      let bodyCol = noise.c;

      if(crowdMode === 'goal'){
        // Standing ovation wave — ripple left to right
        const wave  = Math.sin(frame*0.28 - col*0.22 + row*0.5) * 0.5 + 0.5;
        bob = -wave * 12 * modeT;
        headCol = `hsl(${(col*37+row*77+frame*2)%360},80%,65%)`; // colour shift
        // Scarves — horizontal bar above head
        if(wave > 0.5){
          ctx.fillStyle=`rgba(255,220,0,${modeT*0.8})`;
          ctx.fillRect(px(cx2-6), py(ry+bob-12), 12, 3);
        }
      } else if(crowdMode === 'save'){
        // Opposition side erupts (right half), home side slumps (left half)
        if(col > 16){
          const wave = Math.sin(frame*0.25+col*0.3)*0.5+0.5;
          bob = -wave*8*modeT;
          headCol=`hsl(220,80%,65%)`;
        } else {
          bob = Math.abs(Math.sin(frame*0.12+col*0.2))*3*modeT; // slump down
          headCol=`hsl(0,60%,40%)`;
          // Hands on head pixel
          ctx.fillStyle=`rgba(255,200,150,${modeT*0.5})`;
          ctx.fillRect(px(cx2-5),py(ry+bob-9),4,3);
          ctx.fillRect(px(cx2+1),py(ry+bob-9),4,3);
        }
      } else if(crowdMode === 'miss'){
        // Groaning ripple — everyone leans and bows
        const wave = Math.sin(frame*0.10 + col*0.18)*0.5+0.5;
        bob = wave * 5 * modeT;
        headCol = `hsl(${(col*37+row*77)%360},30%,40%)`; // desaturate
        // Hands-on-head pixel dot
        if(wave > 0.6){
          ctx.fillStyle=`rgba(200,150,120,${modeT*0.6})`;
          ctx.fillRect(px(cx2-3),py(ry+bob-9),6,2);
        }
      } else if(crowdMode === 'post'){
        // Collective "OHHH" — sharp jump then sag, spreading ripple
        const wave = Math.sin(frame*0.35 - col*0.15)*0.5+0.5;
        bob = -wave*9*modeT;
        headCol=`hsl(${(col*37+row*77)%360},60%,65%)`;
      } else {
        // Idle: gentle sway
        const cheer=(Math.sin(frame*0.05+phase)*0.5+0.5)*crowdCheerLevel;
        bob=(Math.sin(frame*0.3+col*0.5)*4*cheer) * 0.6;
      }

      // Head
      ctx.fillStyle=headCol;
      ctx.fillRect(px(cx2-4),py(ry+bob-6),8,8);
      // Body
      ctx.fillStyle=bodyCol;
      ctx.fillRect(px(cx2-5),py(ry+bob+2),10,6);
    }
  }

  // Crowd reaction particles
  crowdParticles.forEach(p=>{
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.fillRect(px(p.x-p.r/2),py(p.y-p.r/2),p.r,p.r);
    ctx.globalAlpha=1;
  });

  // Stadium lights
  const towers=[W*0.04,W*0.25,W*0.75,W*0.96];
  towers.forEach(tx2=>{
    ctx.fillStyle='#1a1a2e';
    ctx.fillRect(px(tx2-4),py(H*0.12),8,py(H*0.1));
    const lf=0.7+0.3*Math.sin(frame*0.03+tx2);
    const grad2=ctx.createRadialGradient(tx2,H*0.14,0,tx2,H*0.14,W*0.25);
    grad2.addColorStop(0,`rgba(255,255,220,${0.15*lf})`);
    grad2.addColorStop(1,'transparent');
    ctx.fillStyle=grad2;
    ctx.fillRect(0,py(H*0.12),W,py(H*0.2));
    ctx.fillStyle=`rgba(255,255,180,${0.8*lf})`;
    ctx.fillRect(px(tx2-6),py(H*0.115),12,4);
  });
}

function drawPitch(){
  // Pitch gradient
  const pg=ctx.createLinearGradient(0,H*0.38,0,H);
  pg.addColorStop(0,'#0a4a0a');
  pg.addColorStop(0.3,'#0d5c0d');
  pg.addColorStop(1,'#062806');
  ctx.fillStyle=pg;
  ctx.fillRect(0,py(H*0.38),W,H);

  // Pixel turf stripes
  for(let i=0;i<8;i++){
    const stripeH=(H-H*0.38)/8;
    if(i%2===0){
      ctx.fillStyle='rgba(0,80,0,0.25)';
      ctx.fillRect(0,py(H*0.38+i*stripeH),W,py(stripeH));
    }
  }

  // Penalty arc / D
  ctx.strokeStyle='rgba(255,255,255,0.5)';
  ctx.lineWidth=2;
  ctx.setLineDash([4,4]);
  ctx.beginPath();
  ctx.arc(W/2,H*0.74,W*0.14,Math.PI,0);
  ctx.stroke();
  ctx.setLineDash([]);

  // Penalty spot
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.fillRect(px(W/2-2),py(H*0.74-2),4,4);

  // Penalty box
  ctx.strokeStyle='rgba(255,255,255,0.5)';
  ctx.lineWidth=2;
  ctx.strokeRect(px(W*0.2),py(H*0.50),px(W*0.6),py(H*0.245));

  // 6-yard box
  ctx.strokeRect(px(W*0.33),py(H*0.50),px(W*0.34),py(H*0.10));

  // Corner flags
  [W*0.2,W*0.8].forEach(cx2=>{
    ctx.fillStyle='#ff3';
    ctx.fillRect(px(cx2-1),py(H*0.50-14),2,14);
    ctx.fillStyle='#f00';
    ctx.fillRect(px(cx2),py(H*0.50-15),8,6);
  });

  // ── Divot / scorch mark at kick point ─────────────────
  if(divotMark){
    // Dark grass scar
    ctx.fillStyle = 'rgba(0,0,0,0.38)';
    ctx.beginPath();
    ctx.ellipse(px(divotMark.x), py(divotMark.y), 16, 6, 0, 0, Math.PI*2);
    ctx.fill();
    // Dirt colour inside
    ctx.fillStyle = 'rgba(100,60,20,0.30)';
    ctx.beginPath();
    ctx.ellipse(px(divotMark.x), py(divotMark.y), 10, 4, 0, 0, Math.PI*2);
    ctx.fill();
    // Turf flick pixels
    ctx.fillStyle = 'rgba(0,120,0,0.5)';
    for(let i=0;i<6;i++){
      const a  = (i/6)*Math.PI*2;
      const d  = 14 + Math.sin(i*1.3)*4;
      ctx.fillRect(
        px(divotMark.x + Math.cos(a)*d - 1),
        py(divotMark.y + Math.sin(a)*d*0.4 - 1),
        2, 2
      );
    }
  }
}

function drawGoal(){
  const postW = 8;
  const lp = W*0.305, rp = W*0.695;
  const topY = H*0.27, botY = H*0.50;
  const postCol   = '#eeeeee';
  const shadowCol = 'rgba(0,0,0,0.35)';

  // ── Net — static or bulging ───────────────────────────
  // Advance net bulge timer
  if(netBulgeTimer > 0) netBulgeTimer += 0.08;
  if(netBulgeTimer > Math.PI) netBulgeTimer = 0;

  const bulgeAmt = netBulgeTimer > 0
    ? Math.sin(netBulgeTimer) * 14   // max 14px forward bulge
    : 0;

  ctx.strokeStyle = `rgba(200,200,200,${netBulgeTimer>0 ? 0.45 : 0.18})`;
  ctx.lineWidth = 1;

  // Vertical net lines
  for(let nx2 = lp+postW; nx2 < rp; nx2 += 12){
    const progress = (nx2 - (lp+postW)) / (rp - (lp+postW)); // 0→1 across width
    const localBulge = bulgeAmt * Math.sin(progress * Math.PI); // bell curve across width
    ctx.beginPath();
    for(let ny2 = topY; ny2 <= botY; ny2 += 10){
      const rowProg   = (ny2 - topY) / (botY - topY);
      const depthBulge = localBulge * rowProg;  // bulge grows toward bottom
      if(ny2 === topY) ctx.moveTo(px(nx2), py(ny2));
      else ctx.lineTo(px(nx2 + depthBulge), py(ny2));
    }
    ctx.stroke();
  }

  // Horizontal net lines
  for(let ny2 = topY; ny2 < botY; ny2 += 10){
    const rowProg = (ny2 - topY) / (botY - topY);
    ctx.beginPath();
    for(let nx2 = lp+postW; nx2 <= rp; nx2 += 12){
      const progress    = (nx2 - (lp+postW)) / (rp - (lp+postW));
      const localBulge  = bulgeAmt * Math.sin(progress * Math.PI);
      const depthBulge  = localBulge * rowProg;
      if(nx2 === lp+postW) ctx.moveTo(px(nx2), py(ny2));
      else ctx.lineTo(px(nx2 + depthBulge), py(ny2));
    }
    ctx.stroke();
  }

  // ── Post shadows ─────────────────────────────────────
  drawPixelRect(lp,     topY+postW, rp-lp,    4,         shadowCol);
  drawPixelRect(lp+postW, topY,       4,      botY-topY, shadowCol);
  drawPixelRect(rp+postW, topY,       4,      botY-topY, shadowCol);

  // ── Posts & crossbar ─────────────────────────────────
  drawPixelRect(lp, topY, postW, botY-topY, postCol);         // left post
  drawPixelRect(rp, topY, postW, botY-topY, postCol);         // right post
  drawPixelRect(lp, topY, rp-lp+postW, postW, postCol);      // crossbar

  // Post shine when bulging (goal flash)
  if(bulgeAmt > 2){
    const flashAlpha = (bulgeAmt/14) * 0.35;
    drawPixelRect(lp, topY, postW, botY-topY, `rgba(255,255,150,${flashAlpha})`);
    drawPixelRect(rp, topY, postW, botY-topY, `rgba(255,255,150,${flashAlpha})`);
    drawPixelRect(lp, topY, rp-lp+postW, postW, `rgba(255,255,150,${flashAlpha})`);
  }

  // ── Goal depth lines ─────────────────────────────────
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth   = 1;
  ctx.beginPath(); ctx.moveTo(px(lp),       py(topY)); ctx.lineTo(px(lp+16),         py(topY-18)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(px(rp+postW), py(topY)); ctx.lineTo(px(rp-16+postW),   py(topY-18)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(px(lp+16),    py(topY-18)); ctx.lineTo(px(rp-16+postW),py(topY-18)); ctx.stroke();
}

function drawGoalkeeper(){
  // GK is ALWAYS visible — default to idle if somehow null
  if(!gkAnim) gkAnim = { phase:'idle', dir:0, frameCount:0, outcome:'' };

  const fc    = gkAnim.frameCount;
  const dir   = gkAnim.dir;
  const phase = gkAnim.phase;
  const gkOut = gkAnim.outcome || '';

  const baseX = W / 2;
  const baseY = H * 0.435;

  let dx = 0, dy = 0, rot = 0;
  let legSpread = 7, armRaiseL = 0.36, armRaiseR = 0.36;
  let crouchY = 0;
  let catchPose   = false;
  let deflectPose = false;

  // ── IDLE — side-to-side sway, always shown ─────────────────
  if(phase === 'idle'){
    const sw = Math.sin(frame * 0.055);
    dx = sw * 11;
    dy = -Math.abs(Math.sin(frame * 0.11)) * 4;
    armRaiseL = 0.40 + sw * 0.18;
    armRaiseR = 0.40 - sw * 0.18;
    legSpread = 9 + Math.abs(sw) * 3;
    crouchY   = Math.abs(Math.sin(frame * 0.09)) * 2;
  }

  // ── WATCH — ball going wide, GK leans and tracks ───────────
  if(phase === 'watch'){
    const t = Math.min(fc / 40, 1);
    dx = dir * t * 14;
    armRaiseL = dir < 0 ? 0.5 + t * 0.3 : 0.3;
    armRaiseR = dir > 0 ? 0.5 + t * 0.3 : 0.3;
    legSpread = 7 + t * 4;
    if(fc >= 55){ gkAnim.phase = 'idle'; gkAnim.frameCount = 0; }
  }

  // ── READY — anticipation crouch ────────────────────────────
  if(phase === 'ready'){
    const t = Math.min(fc / 10, 1);
    crouchY   = t * 10;
    legSpread = 9 + t * 7;
    dx = Math.sin(frame * 0.07) * (1 - t) * 10;
    armRaiseL = 0.45 + t * 0.35;
    armRaiseR = 0.45 + t * 0.35;
    if(fc >= 10){
      gkAnim.phase = 'pushoff';
      gkAnim.frameCount = 0;
    }
  }

  // ── PUSHOFF — explosive first step ─────────────────────────
  if(phase === 'pushoff'){
    const t = Math.min(fc / 7, 1);
    const e = t * t;
    dx = dir * e * 22;
    dy = -e * 17;
    crouchY = (1 - t) * 10;
    rot = dir * e * 0.30;
    armRaiseL = dir < 0 ? 0.9 + e * 0.95 : 0.35;
    armRaiseR = dir > 0 ? 0.9 + e * 0.95 : 0.35;
    legSpread = 13 + t * 9;
    if(fc >= 7){
      if(gkOut === 'catch')   { gkAnim.phase = 'dive_catch';   gkAnim.frameCount = 0; }
      else if(gkOut === 'deflect') { gkAnim.phase = 'dive_deflect'; gkAnim.frameCount = 0; }
      else                    { gkAnim.phase = 'dive';          gkAnim.frameCount = 0; }
    }
  }

  // ── DIVE — standard dive (wrong way / post) ────────────────
  if(phase === 'dive'){
    const t  = Math.min(fc / 22, 1);
    const eo = 1 - Math.pow(1 - t, 3);
    dx  = dir * (22 + eo * 80);
    dy  = -17 + eo * 34;
    rot = dir * (0.30 + eo * 1.0);
    armRaiseL = dir < 0 ? 1.75 : 0.22;
    armRaiseR = dir > 0 ? 1.75 : 0.22;
    legSpread = 18 + eo * 15;
    if(fc >= 22){ gkAnim.phase = 'land'; gkAnim.frameCount = 0; }
  }

  // ── DIVE_CATCH — reach and cup both hands around ball ──────
  if(phase === 'dive_catch'){
    const t  = Math.min(fc / 20, 1);
    const eo = 1 - Math.pow(1 - t, 2);
    dx  = dir * (22 + eo * 62);
    dy  = -17 + eo * 18;
    rot = dir * (0.30 + eo * 0.70);
    if(dir < 0){
      armRaiseL = 0.85 + eo * 1.05;   // lead arm extends to ball
      armRaiseR = 0.55 + eo * 0.80;   // trail arm wraps behind
    } else {
      armRaiseR = 0.85 + eo * 1.05;
      armRaiseL = 0.55 + eo * 0.80;
    }
    legSpread = 17 + eo * 11;
    catchPose = t > 0.55;
    if(fc >= 20){ gkAnim.phase = 'hold'; gkAnim.frameCount = 0; }
  }

  // ── HOLD — clutching ball to chest after catch ─────────────
  if(phase === 'hold'){
    const t = Math.min(fc / 16, 1);
    dx  = dir * (84 - t * 8);
    dy  = 3 + t * 8;
    rot = dir * (1.0 - t * 0.40);
    armRaiseL = 1.55 - t * 0.45;
    armRaiseR = 1.55 - t * 0.45;
    legSpread = 28 - t * 8;
    catchPose = true;
    if(fc >= 16){ gkAnim.phase = 'land'; gkAnim.frameCount = 0; }
  }

  // ── DIVE_DEFLECT — full stretch, one arm vertical, fingertip ─
  if(phase === 'dive_deflect'){
    const t  = Math.min(fc / 22, 1);
    const eo = 1 - Math.pow(1 - t, 2);
    dx  = dir * (22 + eo * 72);
    dy  = -22 + eo * 14;           // stays high — fingertip over bar
    rot = dir * (0.26 + eo * 0.80);
    if(dir < 0){
      armRaiseL = 0.95 + eo * 1.65;  // nearly straight up
      armRaiseR = 0.30 + eo * 0.40;
    } else {
      armRaiseR = 0.95 + eo * 1.65;
      armRaiseL = 0.30 + eo * 0.40;
    }
    legSpread = 19 + eo * 17;
    deflectPose = t > 0.5;
    if(fc >= 22){ gkAnim.phase = 'land'; gkAnim.frameCount = 0; }
  }

  // ── LAND — hit the turf ────────────────────────────────────
  if(phase === 'land'){
    const t = Math.min(fc / 12, 1);
    dx  = dir * (96 + dir * t * 7);
    dy  = 18 + t * 12;
    rot = dir * (1.28 - t * 0.45);
    armRaiseL = dir < 0 ? 1.5 - t * 0.6 : 0.25;
    armRaiseR = dir > 0 ? 1.5 - t * 0.6 : 0.25;
    legSpread = 32 - t * 12;
    if(fc >= 12){ gkAnim.phase = 'recover'; gkAnim.frameCount = 0; }
  }

  // ── RECOVER — get back up, return to idle ──────────────────
  if(phase === 'recover'){
    const t  = Math.min(fc / 38, 1);
    const eo = t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2;
    dx  = dir * (103 - eo * 103);
    dy  = (1 - eo) * 30 - 2;
    rot = dir * (0.83 - eo * 0.83);
    armRaiseL = 0.36 + (1 - t) * 0.44;
    armRaiseR = 0.36 + (1 - t) * 0.44;
    legSpread = 8 + (1 - t) * 18;
    if(fc >= 38){ gkAnim.phase = 'idle'; gkAnim.frameCount = 0; }
  }

  gkAnim.frameCount++;

  // ══════════════════════════════════════════════════════════
  // DRAW GK
  // ══════════════════════════════════════════════════════════
  ctx.save();
  ctx.translate(px(baseX + dx), py(baseY + dy + crouchY));
  ctx.rotate(rot);

  const gc      = '#ff6600';
  const gcd     = '#cc4400';
  const sk      = '#f5c99a';
  const glov    = '#ffe800';
  const glovD   = '#cc9900';
  const ls      = legSpread;

  // Ground shadow
  ctx.fillStyle = 'rgba(0,0,0,0.20)';
  ctx.beginPath();
  ctx.ellipse(0, 40, ls + 5, 5, 0, 0, Math.PI*2);
  ctx.fill();

  // ── LEFT LEG ──────────────────────────────────────────────
  ctx.save();
  ctx.translate(-ls * 0.55, 0);
  if(rot !== 0) ctx.rotate(-rot * 0.45);
  ctx.fillStyle = '#111';    ctx.fillRect(-5,-4,11,21);
  ctx.fillStyle = '#cc0000'; ctx.fillRect(-4,15,9,16);
  ctx.fillStyle = '#fff';    ctx.fillRect(-4,27,9,3);
  ctx.fillStyle = '#1a1a1a'; ctx.fillRect(-6,29,14,7); ctx.fillRect(-7,34,16,4);
  ctx.fillStyle = '#333';    ctx.fillRect(-5,30,8,3);
  ctx.restore();

  // ── RIGHT LEG ─────────────────────────────────────────────
  ctx.save();
  ctx.translate(ls * 0.55, 0);
  if(rot !== 0) ctx.rotate(-rot * 0.45);
  ctx.fillStyle = '#111';    ctx.fillRect(-5,-4,11,21);
  ctx.fillStyle = '#cc0000'; ctx.fillRect(-4,15,9,16);
  ctx.fillStyle = '#fff';    ctx.fillRect(-4,27,9,3);
  ctx.fillStyle = '#1a1a1a'; ctx.fillRect(-6,29,14,7); ctx.fillRect(-7,34,16,4);
  ctx.fillStyle = '#333';    ctx.fillRect(-5,30,8,3);
  ctx.restore();

  // ── TORSO ─────────────────────────────────────────────────
  drawPixelRect(0,-38,12,32,gcd);
  drawPixelRect(-12,-38,24,32,gc);
  drawPixelRect(-6,-38,12,5,gcd);        // collar
  ctx.fillStyle=gcd; ctx.fillRect(-12,-28,3,16); ctx.fillRect(9,-28,3,16);
  ctx.fillStyle='#fff'; ctx.font='bold 10px monospace'; ctx.textAlign='center';
  ctx.fillText('1',0,-20);
  drawPixelRect(-13,-6,26,14,'#111122'); // shorts
  ctx.fillStyle='#fff'; ctx.fillRect(-13,-6,26,3);

  // helper to draw one arm + glove
  function drawArm(tx2, ty2, angle, isLead){
    ctx.save();
    ctx.translate(tx2, ty2);
    ctx.rotate(angle);
    ctx.fillStyle=gc;  ctx.fillRect(-4,0,9,15);
    ctx.fillStyle=gcd; ctx.fillRect(-4,13,9,4);
    ctx.fillStyle=gc;  ctx.fillRect(-4,16,9,13);

    if(catchPose){
      // Open cupped palm — fingers spread
      ctx.fillStyle=glov;  ctx.fillRect(-7,27,15,11);
      ctx.fillStyle='#ff9900'; ctx.fillRect(-7,27,15,3);
      ctx.fillStyle=glovD;
      for(let f=0;f<4;f++) ctx.fillRect(-6+f*3,29,2,9);
      ctx.fillStyle='rgba(255,255,255,0.35)'; ctx.fillRect(-6,28,5,3);
    } else if(deflectPose && isLead){
      // Flat palm facing out — fingertip deflect
      ctx.fillStyle=glov;  ctx.fillRect(-9,27,18,6);
      ctx.fillStyle='#ff9900'; ctx.fillRect(-9,27,18,2);
      ctx.fillStyle=glovD;
      for(let f=0;f<5;f++) ctx.fillRect(-8+f*3,29,2,4);
      ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.fillRect(-8,28,5,2);
    } else {
      // Standard ready glove
      ctx.fillStyle=glov;  ctx.fillRect(-5,27,11,11);
      ctx.fillStyle=glovD; ctx.fillRect(-5,27,2,11); ctx.fillRect(-1,27,2,11); ctx.fillRect(3,27,2,11);
      ctx.fillStyle='rgba(255,255,255,0.32)'; ctx.fillRect(-4,28,4,3);
    }
    ctx.restore();
  }

  drawArm(-14,-32,-armRaiseL, dir<0);
  drawArm( 14,-32, armRaiseR, dir>0);

  // ── HEAD ──────────────────────────────────────────────────
  drawPixelRect(-5,-44,10,8,sk);          // neck
  drawPixelRect(-13,-66,26,24,sk);        // head
  drawPixelRect(-13,-66,26,7,'#3a1800'); // hair
  drawPixelRect(-15,-58,5,7,sk);          // left ear
  drawPixelRect(10, -58,5,7,sk);          // right ear

  const eyeOff = dir * 3;
  const isDiving = ['pushoff','dive','dive_catch','dive_deflect','hold'].includes(phase);

  // whites
  ctx.fillStyle='#fff';
  ctx.fillRect(px(-9+eyeOff),-58,7,8);
  ctx.fillRect(px( 2+eyeOff),-58,7,8);
  // iris
  ctx.fillStyle='#1a3aaa';
  ctx.fillRect(px(-8+eyeOff),-57,5,5);
  ctx.fillRect(px( 3+eyeOff),-57,5,5);
  // pupil
  ctx.fillStyle='#000';
  ctx.fillRect(px(-7+eyeOff),-56,3,3);
  ctx.fillRect(px( 4+eyeOff),-56,3,3);

  // eyebrows
  ctx.fillStyle='#3a1800';
  if(isDiving){
    ctx.fillRect(px(-9+eyeOff),-61+2,6,2);
    ctx.fillRect(px( 2+eyeOff),-61-2,6,2);
  } else if(phase==='hold'){
    ctx.fillRect(px(-9+eyeOff),-63,6,2);
    ctx.fillRect(px( 2+eyeOff),-63,6,2);
  } else {
    ctx.fillRect(px(-9+eyeOff),-61,6,2);
    ctx.fillRect(px( 2+eyeOff),-61,6,2);
  }

  // mouth
  ctx.fillStyle='#c0705a';
  if(isDiving){
    ctx.fillRect(px(-5),-51,10,3);
    ctx.fillStyle='#6a2010'; ctx.fillRect(px(-4),-50,8,2);
  } else if(phase==='hold'){
    ctx.fillRect(px(-6),-51,12,2);
    ctx.fillRect(px(-6),-51,2,5);
    ctx.fillRect(px( 4),-51,2,5);
  } else {
    ctx.fillRect(px(-4),-51,8,2);
  }

  // cap
  drawPixelRect(-14,-68,28,5,'#cc0000');
  drawPixelRect(-16,-63,5,3,'#cc0000');
  drawPixelRect(11, -63,5,3,'#cc0000');
  ctx.fillStyle='#fff'; ctx.fillRect(-2,-67,4,3); // badge

  // ── GLOVE GLOW AURA ───────────────────────────────────────
  if(isDiving || catchPose || deflectPose){
    const ga = 0.26 + Math.sin(frame*0.38)*0.12;
    const gc2 = catchPose   ? `rgba(0,255,130,${ga})`   :
                deflectPose ? `rgba(0,190,255,${ga})`   :
                              `rgba(255,230,0,${ga})`;
    ctx.save();
    if(dir < 0){ ctx.translate(-14,-32); ctx.rotate(-armRaiseL); }
    else        { ctx.translate( 14,-32); ctx.rotate( armRaiseR); }
    ctx.fillStyle = gc2;
    ctx.beginPath();
    ctx.arc(0, catchPose?32:28, catchPose?15:12, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // ── CATCH SPARKLE ─────────────────────────────────────────
  if(phase==='hold' && fc < 16){
    const sf = fc / 16;
    for(let i=0;i<6;i++){
      const a = (i/6)*Math.PI*2 + frame*0.25;
      const r2 = 20 + sf*12;
      ctx.fillStyle=`rgba(255,255,80,${0.9*(1-sf)})`;
      const spx = (dir<0?-14:14) + Math.cos(a)*r2;
      const spy = -32 + Math.sin(a)*r2;
      ctx.fillRect(px(spx-2),py(spy-2),4,4);
    }
  }

  ctx.restore();
}

function drawBall(){
  if(!ballAnim) {
    // Static ball on spot — draw any lingering trail first
    drawBallTrail();
    drawBallAt(W/2, H*0.69, 14, 0);
    return;
  }

  const {sx,sy,tx,ty,t,dur} = ballAnim;
  const prog  = Math.min(t/dur, 1);
  const ease  = prog<0.5 ? 2*prog*prog : 1-Math.pow(-2*prog+2,2)/2;

  const curvePush = curveDir * Math.sin(prog*Math.PI) * 60
                  + windStrength * Math.sin(prog*Math.PI) * 28; // wind nudge
  const bx = sx + (tx-sx)*ease + curvePush;
  const arc = Math.sin(prog*Math.PI) * (-80 * ballAnim.power);
  const by = sy + (ty-sy)*ease + arc;

  const scale = 1 - prog*0.55;
  const r = 14 * scale;

  ballAnim.spin += 0.3 + prog*0.2;

  // Trail colour by zone
  if(prog > 0.05 && prog < 0.95){
    const trailCol = lastShotZone
      ? lastShotZone.col
      : (ballAnim.outcome==='curve' ? '#0ff' : '#fff');
    ballTrail.push({ x:bx, y:by, r:r*0.85, alpha:0.55, col:trailCol });
    if(ballTrail.length > TRAIL_LEN) ballTrail.shift();
  }

  drawBallTrail();

  const sx2 = sx + (W/2-sx)*prog;
  const sy2 = H*0.72;
  const sr  = 12*(1-prog*0.5);
  ctx.fillStyle = `rgba(0,0,0,${0.35*(1-prog*0.4)})`;
  ctx.beginPath();
  ctx.ellipse(px(sx2),py(sy2), sr, sr*0.35, 0, 0, Math.PI*2);
  ctx.fill();

  drawBallAt(bx, by, r, ballAnim.spin);

  // Advance — respects freeze frames only
  if(freezeFrames > 0){
    freezeFrames--;
  } else {
    ballAnim.t++;
  }

  if(ballAnim && ballAnim.t >= ballAnim.dur && !ballAnim.resolved){
    ballAnim.resolved = true;
    const outcome = ballAnim.outcome;
    if(outcome==='post') spawnPostParticles(tx,ty);
    if(outcome==='save') spawnSaveParticles(tx,ty);
    ballAnim = null;
    processResult(outcome);
  }
}

function drawBallTrail(){
  for(let i=0; i<ballTrail.length; i++){
    const t2  = ballTrail[i];
    const age = i / TRAIL_LEN;             // 0=oldest, 1=newest
    const a   = t2.alpha * age * age;      // quadratic fade — older = more transparent
    const tr  = t2.r * (0.3 + age*0.7);   // older ghosts are smaller
    ctx.globalAlpha = a;
    ctx.fillStyle   = t2.col;
    ctx.beginPath();
    ctx.arc(px(t2.x), py(t2.y), Math.max(1,tr), 0, Math.PI*2);
    ctx.fill();
    // Small inner dot for pixel feel
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(px(t2.x), py(t2.y), Math.max(0.5, tr*0.3), 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawBallAt(x,y,r,spin){
  ctx.save();
  ctx.translate(px(x),py(y));

  // Shadow under ball
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(0,r*0.8,r*0.9,r*0.3,0,0,Math.PI*2);
  ctx.fill();

  // Main ball
  ctx.beginPath();
  ctx.arc(0,0,r,0,Math.PI*2);
  ctx.fillStyle='#fff';
  ctx.fill();
  ctx.strokeStyle='#ddd';
  ctx.lineWidth=1;
  ctx.stroke();

  // Pixel pentagons (soccer pattern)
  ctx.save();
  ctx.rotate(spin);
  ctx.clip(); // Clip to ball
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
  ctx.clip();

  const patches=[
    {x:0,y:0},
    {x:r*0.5,y:r*0.5},{x:-r*0.5,y:r*0.5},
    {x:r*0.5,y:-r*0.5},{x:-r*0.5,y:-r*0.5}
  ];
  patches.forEach(p=>{
    ctx.fillStyle='#222';
    const ps=r*0.38;
    ctx.beginPath();
    for(let i=0;i<5;i++){
      const a=i*(Math.PI*2/5)-Math.PI/2;
      if(i===0) ctx.moveTo(p.x+Math.cos(a)*ps, p.y+Math.sin(a)*ps);
      else ctx.lineTo(p.x+Math.cos(a)*ps, p.y+Math.sin(a)*ps);
    }
    ctx.closePath();
    ctx.fill();
  });
  ctx.restore();

  // Shine
  ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.beginPath();
  ctx.ellipse(-r*0.25,-r*0.3,r*0.22,r*0.14,-0.6,0,Math.PI*2);
  ctx.fill();

  ctx.restore();
}

function drawLegs(){
  const bobY=camBob;
  const baseX=W/2;
  const baseY=H;

  // Kick animation or idle bob
  let lKickAngle=0, rKickAngle=0, lY=0, rY=0;
  const walkCycle=Math.sin(frame*0.08)*0.2;

  if(kickAnim){
    const t=kickAnim.t/60;
    if(kickAnim.phase==='windup'){
      // Right leg windup (pull back)
      rKickAngle= -0.6 - Math.min(t/0.25,1)*0.8;
      lKickAngle=walkCycle;
      kickAnim.t++;
      if(kickAnim.t>=15){ kickAnim.phase='kick'; kickAnim.t=0; }
    } else if(kickAnim.phase==='kick'){
      // Right leg swing forward
      const kp=Math.min(kickAnim.t/20,1);
      const ease=kp<0.5?4*kp*kp*kp:(kp-1)*(2*kp-2)*(2*kp-2)+1;
      rKickAngle= -1.4 + ease*2.4;
      lKickAngle=-0.15;
      kickAnim.t++;
      if(kickAnim.t>=20){ kickAnim.phase='followthrough'; kickAnim.t=0; }
    } else {
      // Follow through
      const fp=Math.min(kickAnim.t/25,1);
      rKickAngle= 1.0 - fp*0.8;
      lKickAngle=-0.1+fp*0.1;
      kickAnim.t++;
      if(kickAnim.t>=25){ kickAnim=null; }
    }
  } else {
    // Idle walking bob
    lKickAngle=Math.sin(frame*0.08)*0.15;
    rKickAngle=Math.sin(frame*0.08+Math.PI)*0.15;
  }

  // Draw two legs
  drawLeg(baseX-60, baseY+bobY, lKickAngle, 'left');
  drawLeg(baseX+20, baseY+bobY, rKickAngle, 'right');
}

function drawLeg(x, y, angle, side){
  ctx.save();
  ctx.translate(px(x), py(y));
  ctx.rotate(angle);

  // Thigh (shorts)
  const shortCol='#001f5c';
  drawPixelRect(-12,-60,24,32,shortCol);
  // Shorts stripe
  ctx.fillStyle='#ffffff';
  ctx.fillRect(px(-12),py(-28),24,4);

  // Knee
  drawPixelRect(-10,-30,20,8,'#e8c49a');

  // Shin / sock
  const sockCol='#cc0000';
  const legY=-22;
  ctx.rotate(angle*0.4); // lower leg follows
  drawPixelRect(-9,legY,18,38,sockCol);
  // Sock stripe
  ctx.fillStyle='#fff';
  ctx.fillRect(-9,legY+30,18,4);

  // Cleat / boot
  const bootCol='#111';
  const bootHighlight='#333';
  drawPixelRect(-11,legY+34,22,12,bootCol);
  // Sole
  drawPixelRect(-13,legY+44,26,6,bootCol);
  // Boot toe highlight
  drawPixelRect(-9,legY+35,14,4,bootHighlight);
  // Boot laces
  ctx.fillStyle='#fff';
  for(let i=0;i<3;i++){
    ctx.fillRect(px(-4+i*4),py(legY+37),2,8);
  }
  // Boot stud
  ctx.fillStyle='#555';
  for(let s=0;s<4;s++){
    ctx.fillRect(px(-10+s*6),py(legY+48),4,3);
  }

  ctx.restore();
}

function drawAimReticle(){
  if(state!=='aiming') return;
  const x=aimX, y=aimY;

  // ── Goal frame bounds (match drawGoal constants) ─────────
  const GOAL_LX  = W * 0.305;
  const GOAL_RX  = W * 0.695 + 8;
  const GOAL_TOP = H * 0.27;
  const GOAL_BOT = H * 0.50;
  const inGoal   = x >= GOAL_LX && x <= GOAL_RX && y >= GOAL_TOP && y <= GOAL_BOT;

  // ── Goal-zone bracket overlay ────────────────────────────
  const zoneAlpha = 0.30 + 0.12 * Math.sin(frame * 0.12);
  ctx.strokeStyle = inGoal
    ? `rgba(0,255,100,${zoneAlpha})`
    : `rgba(255,60,60,${zoneAlpha * 0.6})`;
  ctx.lineWidth = 1;
  ctx.setLineDash([5,5]);
  ctx.strokeRect(px(GOAL_LX), py(GOAL_TOP), px(GOAL_RX - GOAL_LX), py(GOAL_BOT - GOAL_TOP));
  ctx.setLineDash([]);

  // Corner brackets
  const blen = 14;
  ctx.strokeStyle = `rgba(0,255,120,${0.45 + 0.15*Math.sin(frame*0.1)})`;
  ctx.lineWidth = 2;
  [[GOAL_LX+1, GOAL_TOP+1, 1, 1],[GOAL_RX-1, GOAL_TOP+1, -1, 1],
   [GOAL_LX+1, GOAL_BOT-1, 1,-1],[GOAL_RX-1, GOAL_BOT-1, -1,-1]].forEach(([cx3,cy3,sx2,sy2])=>{
    ctx.beginPath();
    ctx.moveTo(cx3, cy3 + sy2*blen); ctx.lineTo(cx3, cy3); ctx.lineTo(cx3 + sx2*blen, cy3);
    ctx.stroke();
  });

  // ── Crosshair: green inside, red outside ─────────────────
  const hairCol = inGoal ? 'rgba(0,255,120,0.92)' : 'rgba(255,70,70,0.88)';
  const pulse   = 1 + 0.1 * Math.sin(frame * 0.12);
  const r       = 20 * pulse;

  ctx.strokeStyle = hairCol;
  ctx.lineWidth   = 2;
  ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.arc(px(x), py(y), r, 0, Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);

  const cs = 14;
  ctx.strokeStyle = hairCol;
  ctx.lineWidth   = 2;
  ctx.beginPath();
  ctx.moveTo(px(x-cs),py(y)); ctx.lineTo(px(x-6),py(y));
  ctx.moveTo(px(x+6), py(y)); ctx.lineTo(px(x+cs),py(y));
  ctx.moveTo(px(x),py(y-cs)); ctx.lineTo(px(x),py(y-6));
  ctx.moveTo(px(x),py(y+6));  ctx.lineTo(px(x),py(y+cs));
  ctx.stroke();

  ctx.fillStyle = inGoal ? '#00ff88' : '#ff4444';
  ctx.fillRect(px(x-2), py(y-2), 4, 4);

  // "MISS" warning when aimed outside posts
  if(!inGoal){
    const warnAlpha = 0.65 + 0.35 * Math.sin(frame * 0.28);
    ctx.fillStyle = `rgba(255,60,60,${warnAlpha})`;
    ctx.font = '6px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.fillText('OUT OF POST!', px(x), py(y - r - 6));
  }

  // ── Charge arc — zone colour ──────────────────────────────
  if(isCharging){
    chargeLevel = Math.min(chargeLevel + 0.018, 1);
    const zone    = getZone(chargeLevel);
    const chargeR = r + 10 + chargeLevel * 25;
    ctx.strokeStyle = zone.col;
    ctx.lineWidth   = 3;
    ctx.beginPath();
    ctx.arc(px(x), py(y), chargeR, -Math.PI/2, -Math.PI/2 + chargeLevel*Math.PI*2);
    ctx.stroke();

    ctx.fillStyle   = zone.col;
    ctx.font        = 'bold 7px "Press Start 2P"';
    ctx.textAlign   = 'center';
    ctx.shadowColor = zone.col;
    ctx.shadowBlur  = 8;
    ctx.fillText(zone.label, px(x), py(y + chargeR + 16));
    ctx.shadowBlur  = 0;
  }
}

function drawPowerBar(){
  if(state!=='aiming' && state!=='kicking') return;

  const bx = W - 130, by = H - 44;
  const bw = 110, bh = 18;
  const pad = 4;

  // Outer container
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(bx - pad, by - 22, bw + pad*2, bh + 30);
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx - pad, by - 22, bw + pad*2, bh + 30);

  // "POWER" label
  ctx.fillStyle = '#aaa';
  ctx.font = '5px "Press Start 2P"';
  ctx.textAlign = 'left';
  ctx.fillText('POWER', bx, by - 9);

  // Draw each zone segment
  POWER_ZONES.forEach(z => {
    const sx  = bx + z.from * bw;
    const sw  = (z.to - z.from) * bw - 1;
    // Background slot
    ctx.fillStyle = 'rgba(255,255,255,0.07)';
    ctx.fillRect(sx, by, sw, bh);
    // Filled portion
    const fill = Math.max(0, Math.min(chargeLevel, z.to) - z.from);
    if(fill > 0){
      const fw = (fill / (z.to - z.from)) * sw;
      ctx.fillStyle = z.col;
      ctx.globalAlpha = 0.9;
      ctx.fillRect(sx, by, fw, bh);
      ctx.globalAlpha = 1;
      // Shine strip
      ctx.fillStyle = 'rgba(255,255,255,0.22)';
      ctx.fillRect(sx, by, fw, 4);
    }
    // Zone divider line
    if(z.from > 0){
      ctx.strokeStyle = 'rgba(0,0,0,0.8)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(sx, by);
      ctx.lineTo(sx, by + bh);
      ctx.stroke();
    }
  });

  // Outer border
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, bw, bh);

  // Current zone label below bar (blinks when charging)
  const zone = getZone(chargeLevel);
  const show = !isCharging || (Math.floor(frame/5)%2===0);
  if(show){
    ctx.fillStyle = zone.col;
    ctx.font = '6px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.shadowColor = zone.col;
    ctx.shadowBlur  = 6;
    ctx.fillText(zone.label, bx + bw/2, by + bh + 10);
    ctx.shadowBlur  = 0;
  }

  // Needle / indicator at current charge position
  if(isCharging){
    const nx2 = bx + chargeLevel * bw;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(nx2 - 4, by - 2);
    ctx.lineTo(nx2 + 4, by - 2);
    ctx.lineTo(nx2,     by + 3);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(nx2 - 4, by + bh + 2);
    ctx.lineTo(nx2 + 4, by + bh + 2);
    ctx.lineTo(nx2,     by + bh - 3);
    ctx.closePath();
    ctx.fill();
  }

  // Zone boundary tick marks with mini labels
  const ticks = [
    { pos:0.30, label:'30' },
    { pos:0.55, label:'55' },
    { pos:0.75, label:'75' },
  ];
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '4px "Press Start 2P"';
  ctx.textAlign = 'center';
  ticks.forEach(t => {
    const tx2 = bx + t.pos * bw;
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillRect(tx2 - 0.5, by - 4, 1, bh + 8);
  });
}

function drawArrows(){
  if(state!=='aiming') return;
  // Pixel art arrow hints
  const arrowCol='rgba(255,255,255,0.3)';
  const cx2=W*0.5, ay=H*0.82;
  [[-1,0],[1,0],[0,-1]].forEach(([dx2,dy2])=>{
    ctx.fillStyle=arrowCol;
    const ax=cx2+dx2*40, ay2=ay+dy2*20;
    ctx.font='14px "Press Start 2P"';
    ctx.textAlign='center';
    ctx.fillText(dx2<0?'◄':dx2>0?'►':'▲',ax,ay2);
  });
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=p.life;
    if(p.shape==='star'){
      drawStar(p.x,p.y,p.r,p.color);
    } else {
      ctx.fillStyle=p.color;
      ctx.fillRect(px(p.x-p.r/2),py(p.y-p.r/2),p.r,p.r);
    }
    ctx.globalAlpha=1;
  });
}

function drawOutcomeFlash(){
  const el=document.getElementById('outcome-text');
  const combo2=document.getElementById('combo-text');
  if(state==='result'){
    const msgs={
      goal:  {col:'#ffff00',shadow:'#ff8800'},
      curve: {col:'#00ffff',shadow:'#0066ff'},
      save:  {col:'#ff4444',shadow:'#880000'},
      post:  {col:'#ffffff',shadow:'#666666'},
      miss:  {col:'#ff6600',shadow:'#663300'}
    };
    const m=msgs[currentOutcome]||{col:'#fff',shadow:'#000'};
    el.style.color=m.col;
    el.style.textShadow=`0 0 20px ${m.col}, 0 0 40px ${m.shadow}, 3px 3px 0 ${m.shadow}`;
    el.style.fontSize=currentOutcome==='goal'||currentOutcome==='curve'?'36px':'28px';
  }
}

function showOutcome(text, o, zoneLabel=''){
  const el=document.getElementById('outcome-text');
  const comb=document.getElementById('combo-text');
  el.textContent = text;
  el.style.opacity = text ? '1' : '0';

  // Show zone label as sub-text via combo element when no combo
  if((o==='goal'||o==='curve') && combo>=2){
    comb.textContent=`${combo}x COMBO!`;
    comb.style.color='#ff0';
    comb.style.opacity='1';
    setTimeout(()=>{ comb.style.opacity='0'; },1800);
  } else if(zoneLabel){
    const zoneColors={ POOR:'#ff8800', GOOD:'#ffff00', PERFECT:'#00ff88', BAD:'#ff2222' };
    comb.textContent = `[ ${zoneLabel} SHOT ]`;
    comb.style.color = zoneColors[zoneLabel] || '#fff';
    comb.style.opacity = '1';
    setTimeout(()=>{ comb.style.opacity='0'; }, 1600);
  } else {
    comb.style.opacity='0';
  }

  drawOutcomeFlash();
}

function drawGameover(){
  if(state!=='gameover') return;
  ctx.fillStyle='rgba(0,0,0,0.75)';
  ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.font='22px "Press Start 2P"';
  ctx.textAlign='center';
  ctx.fillStyle='#ff0';
  ctx.shadowColor='#ff0';
  ctx.shadowBlur=20;
  ctx.fillText('FULL TIME!',W/2,H*0.35);
  ctx.shadowBlur=0;

  ctx.font='11px "Press Start 2P"';
  ctx.fillStyle='#fff';
  ctx.fillText(`GOALS: ${score} / ${totalShots} SHOTS`,W/2,H*0.46);
  ctx.fillText(`BEST COMBO: x${maxCombo}`,W/2,H*0.54);

  const rating=score>=4?'WORLD CLASS':score>=3?'GREAT PLAYER':score>=2?'DECENT SHOT':score>=1?'NEEDS PRACTICE':'MISSED THE NET';
  ctx.fillStyle='#0ff';
  ctx.font='9px "Press Start 2P"';
  ctx.fillText(rating,W/2,H*0.63);

  // Pixel trophy if 4+ goals
  if(score>=4){
    drawTrophy(W/2,H*0.76);
  }

  ctx.font='8px "Press Start 2P"';
  ctx.fillStyle='rgba(255,255,255,0.6)';
  const blink2=Math.floor(frame/20)%2===0;
  if(blink2) ctx.fillText('CLICK OR SPACE TO PLAY AGAIN',W/2,H*0.90);
  ctx.restore();
}

function drawTrophy(x,y){
  ctx.fillStyle='#ffd700';
  // Cup base
  ctx.fillRect(px(x-20),py(y-4),40,10);
  ctx.fillRect(px(x-10),py(y-16),20,14);
  // Cup body
  ctx.fillRect(px(x-24),py(y-40),48,26);
  // Cup top
  ctx.fillRect(px(x-18),py(y-48),36,10);
  // Handles
  ctx.fillRect(px(x-32),py(y-38),8,16);
  ctx.fillRect(px(x+24),py(y-38),8,16);
  // Star
  drawStar(x,y-34,8,'#fff');
}

function drawVignette(){
  const v=ctx.createRadialGradient(W/2,H/2,W*0.3,W/2,H/2,W*0.75);
  v.addColorStop(0,'transparent');
  v.addColorStop(1,'rgba(0,0,0,0.5)');
  ctx.fillStyle=v;
  ctx.fillRect(0,0,W,H);
}

function drawFlicker(){
  if(Math.random()<0.004){
    flickerFrames=3+Math.floor(Math.random()*3);
  }
  if(flickerFrames>0){
    ctx.fillStyle='rgba(255,255,255,0.015)';
    ctx.fillRect(0,0,W,H);
    flickerFrames--;
  }
}

function drawPixelGoalLine(){
  // Goal line flash on goal
  if(state==='result'&&(currentOutcome==='goal'||currentOutcome==='curve')){
    const t=resultTimer;
    if(t<30){
      ctx.fillStyle=`rgba(255,255,0,${0.15*(1-t/30)*Math.sin(t*0.5)})`;
      ctx.fillRect(px(W*0.305),py(H*0.27),px(W*0.695-W*0.305+8),py(H*0.23));
    }
  }
  resultTimer++;
}

function drawChargingEffect(){
  if(isCharging&&chargeLevel>0){
    // Electric aura around player area
    ctx.strokeStyle=`rgba(255,255,0,${chargeLevel*0.4})`;
    ctx.lineWidth=1;
    for(let i=0;i<3;i++){
      ctx.setLineDash([2,3]);
      ctx.beginPath();
      ctx.arc(W/2, H*0.8, 40+i*20+Math.sin(frame*0.3+i)*5, 0, Math.PI*2);
      ctx.stroke();
    }
    ctx.setLineDash([]);

    // Screen tint
    ctx.fillStyle=`rgba(255,200,0,${chargeLevel*0.04})`;
    ctx.fillRect(0,0,W,H);
  }
}

function drawArrowKeyAim(){
  if(state==='aiming'){
    const spd=3;
    if(keys['ArrowLeft'])  aimX=Math.max(80, aimX-spd);
    if(keys['ArrowRight']) aimX=Math.min(W-80, aimX+spd);
    if(keys['ArrowUp'])    aimY=Math.max(80, aimY-spd);
    if(keys['ArrowDown'])  aimY=Math.min(H*0.7, aimY+spd);
  }
}

// ─── MAIN LOOP ────────────────────────────────────────────
function update(){
  frame++;

  // Camera bob
  if(state==='aiming'){
    camBobTime+=0.05;
    camBob=Math.sin(camBobTime)*3;
  }

  // Shake decay
  if(shake.power>0){
    shake.x=(Math.random()-0.5)*shake.power;
    shake.y=(Math.random()-0.5)*shake.power;
    shake.power*=0.85;
    if(shake.power<0.2) shake.power=0;
  } else {
    shake.x=0; shake.y=0;
  }

  // GK reacts when ball is ~30% through its flight
  if(gkAnim && gkAnim.phase === 'idle' && ballAnim && ballAnim.t > Math.floor(ballAnim.dur * 0.28)){
    if(gkAnim.outcome === 'watch'){
      gkAnim.phase = 'watch';
    } else {
      gkAnim.phase = 'ready';
    }
    gkAnim.frameCount = 0;
  }

  drawArrowKeyAim();
  updateParticles();

  // ── Commentator timer tick ────────────────────────────
  if(commentatorTimer > 0) commentatorTimer--;

  // ── Crowd mode timer ──────────────────────────────────
  if(crowdModeTimer > 0){
    crowdModeTimer--;
  } else {
    crowdMode = 'idle';
  }

  // ── Wind flag wave ─────────────────────────────────────
  windAngle += 0.08;
}

function drawCommentator(){
  if(!commentatorLine || commentatorTimer <= 0) return;

  const fadeFrames = 20;
  const alpha = Math.min(1, commentatorTimer / fadeFrames);

  // Background pill
  const text   = commentatorLine;
  ctx.font     = '9px "Press Start 2P"';
  const tw     = ctx.measureText(text).width;
  const boxW   = tw + 28;
  const boxH   = 22;
  const boxX   = W/2 - boxW/2;
  const boxY   = H - 28;

  ctx.globalAlpha = alpha * 0.82;
  ctx.fillStyle   = '#000d1a';
  // Rounded rect approximation with pixel rects
  ctx.fillRect(px(boxX+4), py(boxY),     boxW-8, boxH);
  ctx.fillRect(px(boxX),   py(boxY+4),   boxW,   boxH-8);
  ctx.fillRect(px(boxX+2), py(boxY+2),   boxW-4, boxH-4);

  // Border
  ctx.globalAlpha = alpha * 0.7;
  ctx.strokeStyle = '#0ff';
  ctx.lineWidth   = 1;
  ctx.strokeRect(px(boxX+1), py(boxY+1), boxW-2, boxH-2);

  // Microphone icon pixel
  ctx.fillStyle = '#0ff';
  ctx.fillRect(px(boxX+8),  py(boxY+7),  4, 6);
  ctx.fillRect(px(boxX+6),  py(boxY+11), 8, 2);
  ctx.fillRect(px(boxX+9),  py(boxY+13), 2, 3);

  // Text
  ctx.globalAlpha = alpha;
  ctx.fillStyle   = '#fff';
  ctx.font        = '9px "Press Start 2P"';
  ctx.textAlign   = 'left';
  ctx.fillText(text, px(boxX+20), py(boxY+14));

  ctx.globalAlpha = 1;
  ctx.textAlign   = 'center';
}

function drawWindFlag(){
  if(state !== 'aiming' && state !== 'kicking') return;

  const fx = 18, fy = 52;   // top-left corner position
  const poleH = 28;

  // Box background
  ctx.fillStyle = 'rgba(0,0,0,0.60)';
  ctx.fillRect(fx-4, fy-4, 66, 44);
  ctx.strokeStyle = 'rgba(0,200,255,0.4)';
  ctx.lineWidth = 1;
  ctx.strokeRect(fx-4, fy-4, 66, 44);

  // Label
  ctx.fillStyle = '#0cf';
  ctx.font = '5px "Press Start 2P"';
  ctx.textAlign = 'left';
  ctx.fillText('WIND', fx, fy+4);

  // Flagpole
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(fx+6, fy+8);
  ctx.lineTo(fx+6, fy+8+poleH);
  ctx.stroke();

  // Animated flag — sine wave cloth
  const segCount = 6;
  const flagW    = 22;
  const flagH    = 8;
  const flagY    = fy+10;
  const dir      = windStrength >= 0 ? 1 : -1;
  const speed    = Math.abs(windStrength);

  ctx.beginPath();
  ctx.moveTo(fx+6, flagY);
  for(let s=0; s<=segCount; s++){
    const t2  = s / segCount;
    const wx  = fx+6 + dir * t2 * flagW;
    const wy  = flagY + Math.sin(windAngle*2 + t2*Math.PI*1.5) * flagH*0.5*speed*t2;
    if(s===0) ctx.moveTo(wx, wy);
    else ctx.lineTo(wx, wy);
  }
  // Fill flag shape
  const windColour = windStrength > 0.4 ? '#ff4444'
                   : windStrength < -0.4 ? '#4488ff'
                   : '#ffdd00';
  ctx.strokeStyle = windColour;
  ctx.lineWidth   = 5;
  ctx.lineCap     = 'round';
  ctx.stroke();
  ctx.lineCap = 'butt';

  // Strength text
  const strLabel = Math.abs(windStrength) < 0.15 ? 'CALM'
                 : Math.abs(windStrength) < 0.45 ? (dir>0?'>>':' <<')
                 : (dir>0?'>>>':'<<<');
  ctx.fillStyle = windColour;
  ctx.font      = '5px "Press Start 2P"';
  ctx.fillText(strLabel, fx+32, flagY+8);
}

function render(){
  ctx.save();
  ctx.translate(px(shake.x), py(shake.y));

  ctx.fillStyle='#000';
  ctx.fillRect(-10,-10,W+20,H+20);

  drawSky();
  drawCrowd();
  drawPitch();
  drawGoal();
  drawGoalkeeper();
  drawBall();
  drawChargingEffect();
  drawLegs();
  drawAimReticle();
  drawPowerBar();
  drawWindFlag();
  drawArrows();
  drawParticles();
  drawPixelGoalLine();
  drawCommentator();
  drawVignette();
  drawFlicker();

  if(state==='gameover') drawGameover();

  ctx.restore();
}

function loop(){
  update();
  render();
  drawOutcomeFlash();
  requestAnimationFrame(loop);
}

loop();
</script>
