<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>PIXEL KICK — Retro Arcade Soccer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: #000;
    width: 100%; height: 100%;
    overflow: hidden;
    touch-action: none;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Press Start 2P', monospace;
  }

  /* Wrapper scales to fit viewport while keeping 4:3 aspect */
  #wrapper {
    position: relative;
    width: 640px;
    height: 480px;
    /* Scale down on small screens */
    transform-origin: top center;
  }

  #gameCanvas {
    display: block;
    width: 640px;
    height: 480px;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    cursor: none;
    touch-action: none;
  }

  /* CRT overlay */
  #crt {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
    background:
      repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.08) 0px,
        rgba(0,0,0,0.08) 1px,
        transparent 1px,
        transparent 3px
      );
    border-radius: 4px;
  }
  #crt::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.55) 100%);
    border-radius: 4px;
  }

  #scanline {
    position: absolute;
    top: -100%; left: 0;
    width: 100%; height: 20%;
    background: linear-gradient(to bottom, transparent 0%, rgba(255,255,255,0.03) 50%, transparent 100%);
    animation: scan 8s linear infinite;
    pointer-events: none;
    z-index: 11;
  }
  @keyframes scan { 0% { top:-20%; } 100% { top:110%; } }

  #title-screen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #000810;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    gap: 14px;
  }
  .title-glow {
    font-family: 'Press Start 2P', monospace;
    font-size: 28px;
    color: #fff;
    text-shadow: 0 0 10px #0ff, 0 0 30px #0ff, 0 0 60px #0af, 4px 4px 0 #006;
    animation: titlePulse 1.5s ease-in-out infinite alternate;
    letter-spacing: 3px;
  }
  .title-sub {
    font-family: 'VT323', monospace;
    font-size: 20px;
    color: #ff0;
    text-shadow: 2px 2px 0 #880, 0 0 15px #ff0;
    animation: blink 0.8s step-end infinite;
  }
  .title-info {
    font-family: 'VT323', monospace;
    font-size: 15px;
    color: #0f8;
    text-align: center;
    line-height: 26px;
    text-shadow: 0 0 8px #0f8;
  }
  @keyframes titlePulse {
    from { text-shadow: 0 0 10px #0ff, 0 0 30px #0ff, 4px 4px 0 #006; }
    to   { text-shadow: 0 0 20px #0ff, 0 0 50px #0af, 0 0 80px #08f, 4px 4px 0 #006; }
  }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }

  /* Difficulty buttons */
  .diff-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    padding: 8px 10px;
    border: 2px solid #444;
    background: #111;
    color: #888;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.1s;
    letter-spacing: 1px;
    touch-action: manipulation;
  }
  .diff-btn:hover  { background:#222; color:#fff; }
  .diff-btn.active-easy   { border-color:#00ff88; color:#00ff88; background:rgba(0,255,136,0.12); box-shadow:0 0 10px rgba(0,255,136,0.4); }
  .diff-btn.active-normal { border-color:#ffff00; color:#ffff00; background:rgba(255,255,0,0.10);  box-shadow:0 0 10px rgba(255,255,0,0.4); }
  .diff-btn.active-hard   { border-color:#ff4444; color:#ff4444; background:rgba(255,68,68,0.12);  box-shadow:0 0 10px rgba(255,68,68,0.4); }

  /* ── Mode selector buttons ──────────────────────────────── */
  .mode-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    padding: 9px 12px;
    border: 2px solid #444;
    background: #111;
    color: #888;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.1s;
    letter-spacing: 1px;
    touch-action: manipulation;
  }
  .mode-btn:hover { background:#222; color:#fff; }
  .mode-btn.active-cpu { border-color:#0cf; color:#0cf; background:rgba(0,200,255,0.12); box-shadow:0 0 12px rgba(0,200,255,0.45); }
  .mode-btn.active-2p  { border-color:#f8f; color:#f8f; background:rgba(255,140,255,0.12); box-shadow:0 0 12px rgba(255,140,255,0.45); }

  /* ── P2 intro overlay ───────────────────────────────────── */
  #p2-intro-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.88);
    z-index: 22;
    gap: 16px;
  }
  #p2-intro-overlay .p2-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 20px;
    color: #f8f;
    text-shadow: 0 0 18px #f0f, 0 0 40px #a0a, 3px 3px 0 #400;
    animation: titlePulse 1s ease-in-out infinite alternate;
  }
  #p2-intro-overlay .p2-score {
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    color: #fff;
  }
  #p2-intro-overlay .p2-hint {
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: #aaa;
    text-align: center;
    line-height: 26px;
  }
  #p2-start-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 12px 20px;
    background: radial-gradient(ellipse at 40% 35%, #cc44ff, #660099);
    border: 2px solid #ff88ff;
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
    box-shadow: 0 4px 0 #330044, 0 0 18px rgba(200,0,255,0.5);
    touch-action: manipulation;
    animation: blink 1s step-end infinite;
  }
  #p2-start-btn:hover { transform:translateY(2px); box-shadow:0 2px 0 #330044,0 0 28px rgba(200,0,255,0.7); }

  /* ── Main Menu Button ───────────────────────────────────── */
  #menu-btn {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 25;
    font-family: 'Press Start 2P', monospace;
    font-size: 6px;
    padding: 6px 8px;
    background: rgba(0,0,0,0.75);
    color: #0cf;
    border: 1px solid #0cf;
    border-radius: 3px;
    cursor: pointer;
    letter-spacing: 1px;
    display: none;
    touch-action: manipulation;
    transition: background 0.1s, box-shadow 0.1s;
  }
  #menu-btn:hover {
    background: rgba(0,200,255,0.15);
    box-shadow: 0 0 8px rgba(0,200,255,0.5);
  }

  /* ── Play Again / Menu overlay on gameover ──────────────── */
  #gameover-btns {
    position: absolute;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    gap: 12px;
    z-index: 25;
    flex-direction: row;
    align-items: center;
    justify-content: center;
  }
  .go-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    padding: 10px 14px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 1px;
    touch-action: manipulation;
    transition: all 0.1s;
  }
  .go-btn.play-again {
    background: radial-gradient(ellipse at 40% 35%, #ff6600, #992200);
    border: 2px solid #ff9944;
    color: #fff;
    box-shadow: 0 3px 0 #550000, 0 0 14px rgba(255,100,0,0.4);
  }
  .go-btn.play-again:hover {
    box-shadow: 0 1px 0 #550000, 0 0 22px rgba(255,180,0,0.6);
    transform: translateY(2px);
  }
  .go-btn.main-menu {
    background: rgba(0,10,30,0.9);
    border: 2px solid #0cf;
    color: #0cf;
    box-shadow: 0 3px 0 #004, 0 0 10px rgba(0,200,255,0.3);
  }
  .go-btn.main-menu:hover {
    background: rgba(0,200,255,0.12);
    box-shadow: 0 1px 0 #004, 0 0 18px rgba(0,200,255,0.5);
    transform: translateY(2px);
  }

  #hud {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 9;
  }
  .score-display {
    position: absolute;
    top: 10px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: #fff;
    text-shadow: 0 0 8px #0ff, 2px 2px 0 #004;
    white-space: nowrap;
  }
  .shots-display {
    position: absolute;
    top: 28px; left: 50%;
    transform: translateX(-50%);
    font-family: 'VT323', monospace;
    font-size: 16px;
    color: #ff0;
    text-shadow: 0 0 6px #ff0;
    white-space: nowrap;
  }
  #outcome-text {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Press Start 2P', monospace;
    font-size: 26px;
    color: #fff;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    z-index: 15;
    transition: opacity 0.1s;
    white-space: nowrap;
  }
  #combo-text {
    position: absolute;
    top: 38%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'VT323', monospace;
    font-size: 20px;
    color: #ff0;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    z-index: 15;
    text-shadow: 0 0 10px #ff0;
    white-space: nowrap;
  }

  /* ── Big START button on title screen ──────────────────── */
  #start-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    padding: 14px 28px;
    margin-top: 8px;
    background: radial-gradient(ellipse at 40% 35%, #00cc44, #006622);
    border: 3px solid #00ff66;
    border-radius: 8px;
    color: #fff;
    cursor: pointer;
    letter-spacing: 2px;
    touch-action: manipulation;
    box-shadow: 0 5px 0 #003311, 0 0 22px rgba(0,255,80,0.45);
    animation: startPulse 1.2s ease-in-out infinite alternate;
  }
  #start-btn:hover, #start-btn:active {
    transform: translateY(3px);
    box-shadow: 0 2px 0 #003311, 0 0 32px rgba(0,255,80,0.7);
  }
  @keyframes startPulse {
    from { box-shadow: 0 5px 0 #003311, 0 0 14px rgba(0,255,80,0.35); }
    to   { box-shadow: 0 5px 0 #003311, 0 0 30px rgba(0,255,80,0.70); }
  }

  /* ── Mobile shoot button ─────────────────────────────── */
  #shoot-btn {
    display: none; /* shown only on touch devices via JS */
    position: absolute;
    bottom: -90px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 70px;
    background: radial-gradient(ellipse at 40% 35%, #ff6600, #992200);
    border: 3px solid #ff9944;
    border-radius: 12px;
    z-index: 30;
    touch-action: none;
    user-select: none;
    cursor: pointer;
    box-shadow: 0 4px 0 #550000, 0 0 20px rgba(255,100,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 4px;
  }
  #shoot-btn .btn-icon  { font-size: 24px; line-height: 1; }
  #shoot-btn .btn-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: #ffe;
    text-shadow: 1px 1px 0 #000;
    letter-spacing: 1px;
  }
  #shoot-btn.pressed {
    transform: translateX(-50%) translateY(3px);
    box-shadow: 0 1px 0 #550000, 0 0 30px rgba(255,180,0,0.6);
    background: radial-gradient(ellipse at 40% 35%, #ffaa00, #cc4400);
  }
  #shoot-btn.hidden { opacity: 0; pointer-events: none; }

  /* ── Outer page wrapper for scaling ──────────────────── */
  #page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>
<div id="page">
  <div id="wrapper">
    <canvas id="gameCanvas" width="640" height="480"></canvas>
    <div id="crt"></div>
    <div id="scanline"></div>
    <div id="hud">
      <div class="score-display" id="scoreDisplay">GOALS: 0 | SHOTS: 0</div>
      <div class="shots-display"  id="shotsDisplay"></div>
    </div>
    <div id="outcome-text"></div>
    <div id="combo-text"></div>

    <div id="title-screen">
      <div class="title-glow">PIXEL KICK</div>
      <div style="font-family:'VT323',monospace;font-size:16px;color:#888;text-shadow:1px 1px 0 #333;">RETRO ARCADE SOCCER ©1987</div>
      <div class="title-sub" style="margin-top:4px;">— INSERT COIN —</div>

      <!-- Game mode selector -->
      <div style="display:flex;gap:10px;margin-top:6px;" id="mode-buttons">
        <button class="mode-btn" data-mode="cpu" onclick="setMode('cpu')">🤖 VS CPU</button>
        <button class="mode-btn" data-mode="2p"  onclick="setMode('2p')">👥 2 PLAYER</button>
      </div>

      <!-- Difficulty selector (hidden in 2P) -->
      <div style="display:flex;gap:8px;margin-top:4px;" id="diff-buttons">
        <button class="diff-btn" data-diff="easy"   onclick="setDifficulty('easy')">EASY</button>
        <button class="diff-btn" data-diff="normal" onclick="setDifficulty('normal')">NORMAL</button>
        <button class="diff-btn" data-diff="hard"   onclick="setDifficulty('hard')">HARD</button>
      </div>

      <div class="title-info" id="title-controls">
        DRAG / ARROWS → AIM<br>
        HOLD SPACE → CHARGE<br>
        RELEASE → SHOOT
      </div>

      <!-- Big start button — always visible, especially important on mobile -->
      <button id="start-btn" onclick="startGame()">
        ⚽ START GAME
      </button>

      <div style="margin-top:4px;font-family:'VT323',monospace;font-size:13px;color:#555;">HI-SCORE: 9999</div>
    </div>

    <!-- P2 handoff overlay — shown between P1 and P2 turns in 2P mode -->
    <div id="p2-intro-overlay">
      <div class="p2-title">PLAYER 2</div>
      <div class="p2-title" style="font-size:14px;margin-top:-8px;">YOUR TURN!</div>
      <div class="p2-score" id="p2-score-line">P1: 0 goals</div>
      <div class="p2-hint">Pass the device<br>to Player 2</div>
      <button id="p2-start-btn" onclick="startP2Turn()">▶ P2 START</button>
    </div>

    <!-- Main menu button — shown during gameplay -->
    <button id="menu-btn" onclick="goToMenu()">☰ MENU</button>

    <!-- Gameover action buttons overlay -->
    <div id="gameover-btns">
      <button class="go-btn play-again" onclick="initGame()">⚽ PLAY AGAIN</button>
      <button class="go-btn main-menu"  onclick="goToMenu()">⌂ MAIN MENU</button>
    </div>

    <!-- Mobile shoot button lives inside wrapper so it scales with it -->
    <div id="shoot-btn" class="hidden">
      <span class="btn-icon">⚽</span>
      <span class="btn-label">SHOOT</span>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 640, H = 480;

// ─── RESPONSIVE SCALING ───────────────────────────────────
const wrapper   = document.getElementById('wrapper');
const shootBtn  = document.getElementById('shoot-btn');
let   canvasScale = 1;

function resizeGame(){
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

  // Leave room below canvas for shoot button on mobile
  const btnRoom = isMobile ? 100 : 0;
  const scaleX  = vw / 640;
  const scaleY  = (vh - btnRoom) / 480;
  canvasScale   = Math.min(scaleX, scaleY, 1.5); // allow slight upscale on tablets

  wrapper.style.transform = `scale(${canvasScale})`;

  // Centre the scaled wrapper
  const scaledW = 640 * canvasScale;
  const scaledH = 480 * canvasScale;
  wrapper.style.marginTop  = Math.max(0, (vh - btnRoom - scaledH) / 2 / canvasScale) + 'px';

  // Show/position shoot button on touch devices
  if(isMobile){
    shootBtn.classList.remove('hidden');
    shootBtn.style.display = 'flex';
    // Position below canvas (inside wrapper, so it scales with it)
    shootBtn.style.bottom  = `-${Math.round(85 / canvasScale)}px`;
    shootBtn.style.width   = `${Math.round(130 / canvasScale)}px`;
    shootBtn.style.height  = `${Math.round(68 / canvasScale)}px`;

    // Update title screen controls text for touch
    document.getElementById('title-controls').innerHTML =
      'DRAG → AIM<br>HOLD SHOOT BTN → CHARGE<br>RELEASE → SHOOT<br>TAP → START / NEXT';
  }
}

window.addEventListener('resize', resizeGame);
resizeGame();

// ─── DIFFICULTY + MODE SELECTOR ───────────────────────────
// All declared here — before setDifficulty/setMode calls — to avoid TDZ errors
let difficulty = 'normal';
const DIFF = {
  easy:   { goalMult: 1.35, gkSpeed: 0.6,  label: 'EASY',   col: '#00ff88' },
  normal: { goalMult: 1.0,  gkSpeed: 1.0,  label: 'NORMAL', col: '#ffff00' },
  hard:   { goalMult: 0.60, gkSpeed: 1.55, label: 'HARD',   col: '#ff4444' },
};

// 2-Player mode vars
let gameMode     = 'cpu';   // 'cpu' | '2p'
let activePlayer = 1;       // 1 or 2
let p1Score      = 0;
let p2Score      = 0;
let p1History    = [];
let p2History    = [];
const P_COL      = { 1:'#4488ff', 2:'#ff4488' };

function setDifficulty(d){
  difficulty = d;
  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.classList.remove('active-easy','active-normal','active-hard');
    if(btn.dataset.diff === d) btn.classList.add(`active-${d}`);
  });
}
setDifficulty('normal');

function setMode(m){
  gameMode = m;
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.classList.remove('active-cpu','active-2p');
    if(btn.dataset.mode === m) btn.classList.add(`active-${m}`);
  });
  // Show/dim difficulty buttons — irrelevant in 2P but still visible
  const diffBtns = document.getElementById('diff-buttons');
  diffBtns.style.opacity = m==='2p' ? '0.35' : '1';
  diffBtns.style.pointerEvents = m==='2p' ? 'none' : 'auto';
}
setMode('cpu');
function touchToCanvas(touch){
  const rect = canvas.getBoundingClientRect();
  return {
    x: (touch.clientX - rect.left) / canvasScale,
    y: (touch.clientY - rect.top)  / canvasScale
  };
}

// ─── TOUCH INPUT ──────────────────────────────────────────
let touchAimId   = null;   // identifier of the aim finger
let shootBtnDown = false;

// Canvas touch — drag to aim
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  touchAimId = t.identifier;
  const pos  = touchToCanvas(t);
  aimX = Math.max(0, Math.min(W, pos.x));
  aimY = Math.max(0, Math.min(H, pos.y));

  if(state === 'title')    { startGame(); return; }
  if(state === 'result')   { nextShot();  return; }
  if(state === 'gameover') { initGame();  return; }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier === touchAimId){
      const pos = touchToCanvas(t);
      aimX = Math.max(0, Math.min(W, pos.x));
      aimY = Math.max(0, Math.min(H, pos.y));
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchAimId = null;
}, { passive: false });

// Shoot button — touchstart = charge, touchend = shoot
shootBtn.addEventListener('touchstart', e => {
  e.preventDefault();
  if(state === 'title')    { startGame(); return; }
  if(state === 'result')   { nextShot();  return; }
  if(state === 'gameover') { initGame();  return; }
  if(state === 'aiming' && !isCharging){
    haptic([10]);          // ← tiny tick: charge started
    isCharging   = true;
    shootBtnDown = true;
    shootBtn.classList.add('pressed');
  }
}, { passive: false });

shootBtn.addEventListener('touchend', e => {
  e.preventDefault();
  if(state === 'aiming' && isCharging && shootBtnDown){
    haptic([25]);          // ← kick haptic RIGHT HERE in gesture handler
    shoot();
    isCharging   = false;
    shootBtnDown = false;
    shootBtn.classList.remove('pressed');
  }
}, { passive: false });

// Safety: cancel if touch leaves button
shootBtn.addEventListener('touchcancel', e => {
  shootBtnDown = false;
  isCharging   = false;
  shootBtn.classList.remove('pressed');
});

// ─── STATE ───────────────────────────────────────────────
let state = 'title';
let score = 0, totalShots = 0, combo = 0, maxCombo = 0;
let aimX = W/2, aimY = H/2;
let camBob = 0, camBobTime = 0;
let shake = {x:0, y:0, power:0};
let particles = [];
let crowdParticles = [];
let stars = [];
let flickerFrames = 0;
let resultTimer = 0;
let currentOutcome = '';
let lastShotZone = null;
let ballAnim = null;
let kickAnim = null;
let gkAnim = null;
let ballShadow = {x:W/2, y:H*0.72, r:12};
let celebrationTimer = 0;
let crowdCheerLevel = 0;
let crowdBaseNoise = [];
let frame = 0;
let curveDir = 0;
let chargeLevel = 0;
let isCharging = false;
const MAX_SHOTS = 5;
let shotsLeft = MAX_SHOTS;

// ── Feature: Ball Trail ───────────────────────────────────
let ballTrail = [];            // [{x,y,r,alpha}]
const TRAIL_LEN = 10;

// ── Feature: Freeze Frame ─────────────────────────────────
let freezeFrames = 0;

// ── Feature: Divot / Scorch Mark ─────────────────────────
let divotMark = null;

// ── Feature: Net Bulge ────────────────────────────────────
let netBulgeTimer = 0;

// ── Feature: Commentator ─────────────────────────────────
let commentatorLine = '';

// ─── AUDIO ENGINE ─────────────────────────────────────────
function initAudio(){
  if(audioCtx) return audioCtx;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playSound(type){
  try {
    const ac = initAudio();
    if(ac.state === 'suspended') ac.resume();
    const now = ac.currentTime;

    if(type === 'kick'){
      // Deep boot thud: low sine burst + noise punch
      const osc  = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(90, now);
      osc.frequency.exponentialRampToValueAtTime(30, now + 0.12);
      gain.gain.setValueAtTime(0.9, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
      osc.start(now); osc.stop(now + 0.18);
      // White noise click layer
      const buf  = ac.createBuffer(1, ac.sampleRate * 0.06, ac.sampleRate);
      const data = buf.getChannelData(0);
      for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*0.4;
      const src2  = ac.createBufferSource();
      const filt  = ac.createBiquadFilter();
      const ng    = ac.createGain();
      src2.buffer = buf;
      filt.type = 'lowpass'; filt.frequency.value = 800;
      src2.connect(filt); filt.connect(ng); ng.connect(ac.destination);
      ng.gain.setValueAtTime(0.7, now);
      ng.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
      src2.start(now);
    }

    else if(type === 'whoosh'){
      // Ball flight whoosh — filtered noise sweep
      const buf  = ac.createBuffer(1, ac.sampleRate * 0.5, ac.sampleRate);
      const data = buf.getChannelData(0);
      for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1);
      const src  = ac.createBufferSource();
      const filt = ac.createBiquadFilter();
      const gain = ac.createGain();
      src.buffer = buf;
      filt.type  = 'bandpass';
      filt.frequency.setValueAtTime(3000, now);
      filt.frequency.exponentialRampToValueAtTime(800, now + 0.45);
      filt.Q.value = 4;
      gain.gain.setValueAtTime(0.0, now);
      gain.gain.linearRampToValueAtTime(0.3, now + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
      src.connect(filt); filt.connect(gain); gain.connect(ac.destination);
      src.start(now);
    }

    else if(type === 'goal'){
      // Crowd roar — layered noise swell
      for(let layer=0;layer<3;layer++){
        const buf  = ac.createBuffer(1, ac.sampleRate * 1.8, ac.sampleRate);
        const data = buf.getChannelData(0);
        for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1);
        const src  = ac.createBufferSource();
        const filt = ac.createBiquadFilter();
        const gain = ac.createGain();
        src.buffer = buf;
        filt.type  = 'lowpass';
        filt.frequency.value = 300 + layer*200;
        gain.gain.setValueAtTime(0.0, now);
        gain.gain.linearRampToValueAtTime(0.18-layer*0.04, now+0.15);
        gain.gain.linearRampToValueAtTime(0.12-layer*0.02, now+1.2);
        gain.gain.exponentialRampToValueAtTime(0.001, now+1.8);
        src.connect(filt); filt.connect(gain); gain.connect(ac.destination);
        src.start(now + layer*0.04);
      }
      // Net swish — short high noise burst
      const nbuf  = ac.createBuffer(1, ac.sampleRate * 0.12, ac.sampleRate);
      const ndata = nbuf.getChannelData(0);
      for(let i=0;i<ndata.length;i++) ndata[i]=(Math.random()*2-1);
      const nsrc  = ac.createBufferSource();
      const nfilt = ac.createBiquadFilter();
      const ngain = ac.createGain();
      nsrc.buffer = nbuf;
      nfilt.type  = 'highpass'; nfilt.frequency.value = 4000;
      ngain.gain.setValueAtTime(0.4, now+0.12);
      ngain.gain.exponentialRampToValueAtTime(0.001, now+0.24);
      nsrc.connect(nfilt); nfilt.connect(ngain); ngain.connect(ac.destination);
      nsrc.start(now + 0.12);
    }

    else if(type === 'save'){
      // Glove slap — sharp mid transient
      const osc  = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(220, now);
      osc.frequency.exponentialRampToValueAtTime(80, now + 0.08);
      gain.gain.setValueAtTime(0.5, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      osc.start(now); osc.stop(now + 0.1);
      // Crowd groan — low filtered noise
      const buf  = ac.createBuffer(1, ac.sampleRate * 0.9, ac.sampleRate);
      const data = buf.getChannelData(0);
      for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1);
      const src  = ac.createBufferSource();
      const filt = ac.createBiquadFilter();
      const ng   = ac.createGain();
      src.buffer = buf;
      filt.type  = 'lowpass'; filt.frequency.value = 180;
      ng.gain.setValueAtTime(0.0, now+0.05);
      ng.gain.linearRampToValueAtTime(0.10, now+0.2);
      ng.gain.exponentialRampToValueAtTime(0.001, now+0.9);
      src.connect(filt); filt.connect(ng); ng.connect(ac.destination);
      src.start(now+0.05);
    }

    else if(type === 'post'){
      // Metallic clang — detuned pair of oscillators with decay
      [200, 202, 308, 312].forEach((freq, i) => {
        const osc  = ac.createOscillator();
        const gain = ac.createGain();
        osc.connect(gain); gain.connect(ac.destination);
        osc.type = 'sawtooth';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.22, now + i*0.005);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
        osc.start(now + i*0.005); osc.stop(now + 0.65);
      });
    }

    else if(type === 'miss'){
      // Deflated tuba-ish wah-wah
      [130, 123, 116].forEach((freq, i) => {
        const osc  = ac.createOscillator();
        const gain = ac.createGain();
        osc.connect(gain); gain.connect(ac.destination);
        osc.type = 'triangle';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.18, now + i*0.14);
        gain.gain.exponentialRampToValueAtTime(0.001, now + i*0.14 + 0.13);
        osc.start(now + i*0.14); osc.stop(now + i*0.14 + 0.14);
      });
    }

    else if(type === 'whistle'){
      // Referee short pip
      const osc  = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(2400, now);
      osc.frequency.setValueAtTime(2600, now+0.04);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
      osc.start(now); osc.stop(now + 0.12);
    }

    else if(type === 'slowmo'){
      // Deep cinematic whomp on slow-mo trigger
      const osc  = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(60, now);
      osc.frequency.exponentialRampToValueAtTime(25, now + 0.4);
      gain.gain.setValueAtTime(0.5, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      osc.start(now); osc.stop(now + 0.4);
    }

  } catch(e){ /* audio blocked — ignore silently */ }
}

function randCrowdColor(){
  const cols=['#ff3333','#3366ff','#ffff00','#ffffff','#33cc33','#ff9900','#cc33ff','#00ffff'];
  return cols[Math.floor(Math.random()*cols.length)];
}

let keys = {};
// Prevent arrow keys and space from scrolling the page
document.addEventListener('keydown', e=>{
  if(['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
  keys[e.code]=true;

  if(e.code==='Space'){
    if(state==='title')    { startGame();   return; }
    if(state==='aiming')   { if(!isCharging){ isCharging=true; chargeLevel=0; } return; }
    if(state==='result')   { nextShot();    return; }
    if(state==='p2_intro') { startP2Turn(); return; }
    if(state==='gameover') { initGame();    return; }
  }
  if(e.code==='Enter'){
    if(state==='title')    { startGame();   return; }
    if(state==='result')   { nextShot();    return; }
    if(state==='p2_intro') { startP2Turn(); return; }
    if(state==='gameover') { initGame();    return; }
  }
});

document.addEventListener('keyup', e=>{
  keys[e.code]=false;
  // Space release fires the shot
  if(e.code==='Space' && state==='aiming' && isCharging){
    haptic([25]);          // ← in keyup gesture handler
    shoot();
    isCharging=false;
  }
});

// Mouse: move updates aim, click only restarts (no shoot-on-click to avoid conflicts)
canvas.addEventListener('mousemove', e=>{
  const r=canvas.getBoundingClientRect();
  aimX=e.clientX-r.left;
  aimY=e.clientY-r.top;
});

// Click is ONLY for title/result/gameover transitions, never for shooting
canvas.addEventListener('click', e=>{
  if(state==='title')   { startGame(); return; }
  if(state==='result')  { nextShot(); return; }
  if(state==='gameover'){ initGame(); return; }
});

// ─── POWER ZONES ──────────────────────────────────────────
// 0.00–0.30 → POOR   (goal 20%)
// 0.30–0.55 → GOOD   (goal 50%)
// 0.55–0.75 → PERFECT(goal 90%)
// 0.75–1.00 → BAD    (goal  0%)
const POWER_ZONES = [
  { label:'POOR',    from:0.00, to:0.30, col:'#ff8800', goalChance:0.20 },
  { label:'GOOD',    from:0.30, to:0.55, col:'#ffff00', goalChance:0.50 },
  { label:'PERFECT', from:0.55, to:0.75, col:'#00ff88', goalChance:0.90 },
  { label:'BAD',     from:0.75, to:1.00, col:'#ff2222', goalChance:0.00 },
];

function getZone(lvl){
  return POWER_ZONES.find(z => lvl >= z.from && lvl < z.to) || POWER_ZONES[3];
}

// ─── HAPTIC FEEDBACK ──────────────────────────────────────
function haptic(pattern){
  try { if(navigator.vibrate) navigator.vibrate(pattern); } catch(e){}
}

function shoot(){
  if(state!=='aiming') return;
  state='kicking';
  totalShots++;
  shotsLeft--;

  const zone  = getZone(chargeLevel);
  const power = 0.5 + chargeLevel * 0.5;
  curveDir = 0;

  // ── Goal frame in screen-space ──────────────────────────
  // Posts: lp=W*0.305, rp=W*0.695+8  top=H*0.27  bot=H*0.50
  const GOAL_LX  = W * 0.305;          // inner left post edge
  const GOAL_RX  = W * 0.695 + 8;      // inner right post edge
  const GOAL_TOP = H * 0.27;
  const GOAL_BOT = H * 0.50;

  // ── Is the crosshair inside the goal frame? ─────────────
  const aimedInGoal = (
    aimX >= GOAL_LX && aimX <= GOAL_RX &&
    aimY >= GOAL_TOP && aimY <= GOAL_BOT
  );

  let outcome, targetX, targetY;

  if(!aimedInGoal){
    // ── AIMED OUTSIDE THE POST — always miss ──────────────
    outcome = 'miss';
    // Ball travels toward where the player actually aimed
    targetX = aimX;
    targetY = aimY;
  } else if(zone.label === 'BAD'){
    // ── BAD power zone — always miss even inside frame ────
    outcome = 'miss';
    // Skew the ball just outside the frame for visual drama
    const missDir = (aimX < W/2) ? -1 : 1;
    const missRoll = Math.random();
    if(missRoll < 0.5){
      targetX = (missDir < 0) ? W * 0.25 : W * 0.75;
      targetY = aimY + (Math.random() - 0.5) * 40;
    } else {
      targetX = aimX + missDir * 30;
      targetY = H * 0.06;             // skied over bar
    }
  } else {
    // ── Aimed inside goal — use zone goal-chance roll ─────
    const roll   = Math.random();
    // Apply difficulty multiplier to goal chance
    const adjChance = Math.min(0.97, zone.goalChance * DIFF[difficulty].goalMult);
    const isGoal = roll < adjChance;

    if(isGoal){
      const isCurve = Math.random() < 0.18;
      outcome  = isCurve ? 'curve' : 'goal';
      curveDir = isCurve ? (Math.random() < 0.5 ? 1 : -1) : 0;
      // Ball lands exactly where player aimed (inside goal)
      targetX  = aimX;
      targetY  = aimY;
    } else {
      // Fail inside frame — save, post, or scrambled miss
      const failRoll = Math.random();
      if(failRoll < 0.55){
        outcome = 'save';
        // GK positioned toward aimed side
        targetX = aimX;
        targetY = aimY;
      } else if(failRoll < 0.80){
        outcome = 'post';
        // Snap to nearest post
        const distL = Math.abs(aimX - GOAL_LX);
        const distR = Math.abs(aimX - GOAL_RX);
        targetX = (distL < distR) ? GOAL_LX : GOAL_RX;
        targetY = aimY;
      } else {
        // Narrowly wide or just over
        outcome = 'miss';
        const missDir2 = (aimX < W/2) ? -1 : 1;
        targetX = aimX + missDir2 * (20 + Math.random() * 30);
        targetY = aimY - 10;
      }
    }
  }

  // ── GK reaction — always visible, phase depends on outcome ─
  if(outcome === 'save'){
    const diveDir = (targetX < W/2) ? -1 : 1;
    // Randomise catch vs deflect for variety
    const saveType = Math.random() < 0.55 ? 'catch' : 'deflect';
    gkAnim = { phase:'ready', dir:diveDir, frameCount:0, outcome:saveType, targetX, targetY };
  } else if(outcome === 'goal' || outcome === 'curve'){
    // Dives the wrong way — full commit wrong side
    const wrongDir = (targetX < W/2) ? 1 : -1;
    gkAnim = { phase:'ready', dir:wrongDir, frameCount:0, outcome:'wrongdive', targetX, targetY };
  } else if(outcome === 'post'){
    // Slight reach toward post then recoil
    const postDir = (targetX < W/2) ? -1 : 1;
    gkAnim = { phase:'ready', dir:postDir, frameCount:0, outcome:'post', targetX, targetY };
  } else {
    // Miss — GK watches ball go wide, slight lean — start idle, update loop triggers watch
    const watchDir = (targetX < W/2) ? -1 : 1;
    gkAnim = { phase:'idle', dir:watchDir, frameCount:0, outcome:'watch', targetX, targetY };
  }

  currentOutcome = outcome;
  lastShotZone   = zone;
  kickAnim = { t:0, phase:'windup' };

  // ── Ball speed driven purely by chargeLevel ───────────────
  // POOR(0–30%) = slow floaty dur 70  BAD(75–100%) = wild dur 62
  // GOOD(30–55%) = medium dur 48      PERFECT(55–75%) = fast dur 28
  const baseDur = zone.label === 'PERFECT' ? 28
                : zone.label === 'GOOD'    ? 48
                : zone.label === 'POOR'    ? 70
                :                           62; // BAD — skied/wild
  // Miss shots always travel full distance to edge — add a few frames
  const dur = outcome === 'miss' ? baseDur + 14 : baseDur;

  ballAnim = {
    sx:W/2, sy:H*0.68, tx:targetX, ty:targetY,
    t:0, dur,
    power, outcome, curveDir, spin:0
  };
  resultTimer = 0;

  // ── Divot mark ────────────────────────────────────────────
  divotMark = { x: W/2 + (Math.random()-0.5)*8, y: H*0.72 };

  // ── Wind: new random value each shot ─────────────────────
  windStrength = (Math.random()*2 - 1) * 0.8;

  // ── Sound: kick thud + whoosh ─────────────────────────────
  playSound('kick');
  setTimeout(() => playSound('whoosh'), 80);
  playSound('whistle');

  // ── Record shot for replay summary ───────────────────────
  shotHistory.push({
    shot: totalShots,
    zone: zone.label,
    outcome: currentOutcome  // will be confirmed in processResult
  });

  // ── Commentator pre-shot line (zone-aware) ───────────────
  const preLines = {
    POOR:    ['A weak effort...','Not much behind that one.','Lacking conviction!'],
    GOOD:    ['He steps up...','A measured approach.','Decent strike incoming!'],
    PERFECT: ['WHAT A HIT!','Absolutely thundered!','Pure technique!'],
    BAD:     ["Oh no, he's slipped!",'Terrible contact!',"That's gone badly wrong!"]
  };
  const zonePre = preLines[zone.label] || ['He shoots...'];
  setCommentator(zonePre[Math.floor(Math.random()*zonePre.length)], 90);
}

// ─── COMMENTATOR ──────────────────────────────────────────
function setCommentator(line, duration=110){
  commentatorLine  = line;
  commentatorTimer = duration;
}

function resolveOutcome(o){
  // Rich outcome lines — also sets a detailed commentator follow-up
  const data = {
    goal: {
      big:  ['GOAAAAAL!!', "IT'S IN THE NET!!", 'WHAT A FINISH!!', 'SCREAMER!!'],
      comm: ['Keeper had no chance!', 'Right in the bottom corner!', 'The crowd goes absolutely wild!', 'Unstoppable strike!']
    },
    curve: {
      big:  ['CURVED IN!!', 'BANANA SHOT!!', 'ROBERTO CARLOS!!', 'WHAT A STRIKE!!'],
      comm: ['Incredible bend on that!', 'Defied all physics!', "The keeper was watching it all the way - helpless!", 'Pure magic from the spot!']
    },
    save: {
      big:  ['SAVED!!', 'KEEPER STOPS IT!', 'GREAT SAVE!!', 'DENIED!!'],
      comm: ['Brilliant dive to his right!', 'He read it perfectly!', 'What a stop — gloves like magnets!', 'The keeper wins this battle!']
    },
    post: {
      big:  ['POST!!', 'OFF THE WOODWORK!', 'SO CLOSE!!', 'RATTLES THE FRAME!'],
      comm: ['Inches away from glory...', "The post is his saviour!", 'That must have stung — centimetres wide!', 'Out of luck today!']
    },
    miss: {
      big:  ['MISSED!!', 'OVER THE BAR!', 'WIDE!!', 'SKIED IT!!'],
      comm: ['Row Z! No doubt about it.', 'Nowhere near the target.', 'The pressure got to him!', 'That\'s going to hurt...']
    }
  };
  const d    = data[o] || data.miss;
  const idx  = Math.floor(Math.random() * d.big.length);
  // Fire the follow-up commentator line slightly delayed
  setTimeout(()=> setCommentator(d.comm[idx % d.comm.length], 140), 400);
  return d.big[idx];
}

function processResult(o){

  if(o==='goal'||o==='curve'){
    score++;
    combo++;
    if(combo>maxCombo) maxCombo=combo;
    crowdCheerLevel=1;
    spawnGoalParticles();
    triggerShake(8,18);
    netBulgeTimer = 1;
    crowdMode = 'goal';  crowdModeTimer = 180;
    playSound('goal');
    setTimeout(()=>haptic([80,20,80]), 0);
  } else if(o==='post'){
    triggerShake(5,10);
    freezeFrames = 5;
    combo=0;
    crowdMode = 'post';  crowdModeTimer = 90;
    playSound('post');
    setTimeout(()=>haptic([60,30,30]), 0);
  } else if(o==='save'){
    triggerShake(3,8);
    freezeFrames = 4;
    combo=0;
    crowdMode = 'save';  crowdModeTimer = 120;
    playSound('save');
    setTimeout(()=>haptic([40,20,40]), 0);
  } else {
    combo=0;
    crowdMode = 'miss';  crowdModeTimer = 100;
    playSound('miss');
    setTimeout(()=>haptic([200]), 0);
  }

  state='result';
  resultTimer=0;
  updateHUD();

  const zoneLabel = lastShotZone ? lastShotZone.label : '';
  const msg = resolveOutcome(o);
  showOutcome(msg, o, zoneLabel);

  // Record in active player's history (2P) or shared history (CPU mode)
  if(gameMode === '2p'){
    const hist = activePlayer===1 ? p1History : p2History;
    hist.push({ shot: MAX_SHOTS - shotsLeft, zone: zoneLabel, outcome: o });
  }

  const delay = shotsLeft<=0 ? 2200 : 1800;
  setTimeout(()=>{ if(state==='result') nextShot(); }, delay);
}

function updateHUD(){
  const isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  if(state==='aiming'){
    if(gameMode==='2p'){
      const pLabel = `P${activePlayer}`;
      const pOther = activePlayer===1 ? '' : `  P1: ${p1Score}`;
      document.getElementById('scoreDisplay').textContent =
        `${pLabel} SHOT ${totalShots+1}/5${pOther}`;
    } else {
      document.getElementById('scoreDisplay').textContent =
        `YOU: ${score}  CPU: ${cpuScore}  |  SHOT ${totalShots+1}/5`;
    }
    const hint = isMobile
      ? `⚽ x${shotsLeft}  DRAG TO AIM · HOLD BTN TO CHARGE`
      : `⚽ x${shotsLeft}  MOUSE/ARROWS=AIM  SPACE=SHOOT`;
    document.getElementById('shotsDisplay').textContent = hint;
  } else if(state==='cpu_shooting'||state==='cpu_result'||state==='cpu_intro'){
    document.getElementById('scoreDisplay').textContent =
      `YOU: ${score}  CPU: ${cpuScore}  |  CPU SHOT ${cpuShotIndex}/5`;
    document.getElementById('shotsDisplay').textContent = '⚡ CPU IS SHOOTING...';
  } else if(state==='p2_intro'){
    document.getElementById('scoreDisplay').textContent = `P1: ${p1Score} goals`;
    document.getElementById('shotsDisplay').textContent = 'PASS TO PLAYER 2';
  } else if(state==='gameover'){
    if(gameMode==='2p'){
      document.getElementById('scoreDisplay').textContent =
        `FINAL: P1 ${p1Score} — ${p2Score} P2`;
    } else {
      document.getElementById('scoreDisplay').textContent =
        `FINAL: YOU ${score} — ${cpuScore} CPU`;
    }
    document.getElementById('shotsDisplay').textContent='';
  } else {
    if(gameMode==='2p'){
      document.getElementById('scoreDisplay').textContent =
        `P${activePlayer} SHOOTING...`;
    } else {
      document.getElementById('scoreDisplay').textContent =
        `YOU: ${score}  CPU: ${cpuScore}`;
    }
    document.getElementById('shotsDisplay').textContent='';
  }
}
